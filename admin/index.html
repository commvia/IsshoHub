<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>文章管理 — IsshoHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&family=Shippori+Mincho:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Zen+Old+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css?v=6">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><circle cx='40' cy='40' r='36' fill='%230d2444'/><path d='M 40 8 A 32 32 0 0 1 40 72' stroke='%23d9b683' stroke-width='4' fill='none' stroke-linecap='round'/><text x='40' y='48' text-anchor='middle' font-family='Zen Old Mincho, Shippori Mincho, serif' font-size='26' fill='%23f6f3ec' letter-spacing='-1'>%E4%B8%80</text></svg>">
<style>
  .brand .brand-mark,.footer-brand .brand-mark,.modal-brand .brand-mark,.mobile-menu-head .brand-mark{background:transparent!important;border:0!important;padding:0!important;color:inherit!important;font-size:0!important;line-height:0!important;width:auto!important;height:auto!important;box-shadow:none!important;border-radius:0!important;overflow:visible!important;display:inline-flex;align-items:center;justify-content:center;}
  .brand .brand-mark svg,.footer-brand .brand-mark svg,.modal-brand .brand-mark svg,.mobile-menu-head .brand-mark svg{display:block;width:38px;height:38px;}
  .brand-name .hub{color:#a8762f;}
  body{background:#f4f1ec;}
  .adm-hero{background:var(--navy);padding:40px 0 36px;}
  .adm-hero-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .adm-hero-left{display:flex;align-items:center;gap:14px;}
  .adm-hero-icon{width:44px;height:44px;background:rgba(217,182,131,.15);border:1px solid rgba(217,182,131,.3);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#d9b683;flex-shrink:0;}
  .adm-hero-title{font-size:22px;font-weight:800;color:#f6f3ec;margin:0 0 2px;font-family:'Noto Sans TC',sans-serif;}
  .adm-hero-sub{font-size:13px;color:rgba(246,243,236,.45);margin:0;}
  .adm-new-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:var(--accent);color:#fff;border-radius:999px;font-size:14px;font-weight:600;border:0;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
  .adm-new-btn:hover{opacity:.85;}
  .adm-main{max-width:1200px;margin:0 auto;padding:32px 24px 80px;}
  .adm-toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
  .adm-search{flex:1;min-width:200px;position:relative;}
  .adm-search input{width:100%;padding:9px 14px 9px 38px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff;color:var(--ink);font-family:inherit;}
  .adm-search input:focus{outline:none;border-color:var(--navy);}
  .adm-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none;}
  .adm-filter{padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff;color:var(--ink);font-family:inherit;cursor:pointer;}
  .adm-filter:focus{outline:none;border-color:var(--navy);}
  .adm-count{font-size:13px;color:var(--ink-3);white-space:nowrap;margin-left:auto;}
  .adm-table-wrap{background:#fff;border-radius:12px;border:1px solid var(--line);overflow:hidden;}
  .adm-table{width:100%;border-collapse:collapse;font-size:14px;}
  .adm-table th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);background:var(--paper);border-bottom:1px solid var(--line);white-space:nowrap;}
  .adm-table td{padding:13px 16px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .adm-table tr:last-child td{border-bottom:0;}
  .adm-table tr.adm-row{cursor:pointer;transition:background .12s;}
  .adm-table tr.adm-row:hover{background:#faf8f4;}
  .adm-col-title{max-width:340px;}
  .adm-title-tc{font-weight:600;color:var(--navy-ink);line-height:1.35;margin-bottom:2px;}
  .adm-title-en{font-size:12px;color:var(--ink-3);line-height:1.3;}
  .adm-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;}
  .adm-badge-published{background:#e6f7ee;color:#276749;}
  .adm-badge-draft{background:#fef3cd;color:#7d5a00;}
  .adm-badge-archived{background:#f2f2f2;color:#666;}
  .adm-cat-tag{font-size:11px;font-weight:600;color:var(--accent-ink);background:rgba(55,138,221,.08);padding:2px 8px;border-radius:5px;white-space:nowrap;}
  .adm-date{font-size:12px;color:var(--ink-3);white-space:nowrap;}
  .adm-actions{display:flex;gap:6px;}
  .adm-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--line);border-radius:6px;font-size:12px;font-weight:500;color:var(--ink-2);cursor:pointer;background:#fff;transition:all .12s;white-space:nowrap;text-decoration:none;}
  .adm-btn:hover{border-color:var(--navy);color:var(--navy);background:rgba(13,36,68,.04);}
  .adm-empty,.adm-loading{text-align:center;padding:60px 24px;color:var(--ink-3);}
  .adm-featured-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:2px 6px;border-radius:5px;transition:background .12s;}
  .adm-featured-btn:hover{background:rgba(217,182,131,.2);}
  @media(max-width:768px){.adm-col-author,.adm-col-updated{display:none;}.adm-col-title{max-width:200px;}}
</style>
</head>
<body data-lang="tc">

<div class="admin-bar" data-admin-bar style="display:none">
  <div class="admin-bar-inner">
    <span class="admin-bar-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> 管理員模式</span>
    <div class="admin-bar-actions"></div>
  </div>
</div>

<div class="topbar"><div class="container row"><div class="ticker"><span data-i18n="ticker1"></span><span data-i18n="ticker2"></span></div><div class="meta"><span data-i18n="ticker-weather"></span><span>·</span><span data-i18n="ticker-rate" id="tickerRate"></span></div></div></div>

<nav class="nav">
  <div class="container row">
    <a class="brand" href="/" style="text-decoration:none;outline:none;">
      <div class="brand-mark" aria-hidden="true"><svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="36" fill="#0d2444"/><path d="M 40 8 A 32 32 0 0 1 40 72" stroke="#d9b683" stroke-width="2.5" fill="none" stroke-linecap="round"/><text x="40" y="46" text-anchor="middle" font-family="Zen Old Mincho, Shippori Mincho, serif" font-size="22" font-weight="500" fill="#f6f3ec" letter-spacing="-1">一緒</text></svg></div>
      <div><div class="brand-name">Issho<span class="hub">Hub</span></div><div class="brand-tag">In Japan, together.</div></div>
    </a>
    <div class="nav-links" id="navLinks"></div>
    <div class="nav-right">
      <div class="lang-toggle" id="langToggle"><button data-lang-set="tc">繁中</button><button data-lang-set="en">EN</button></div>
      <div class="user-menu" data-user-menu style="display:none">
        <button class="user-menu-btn" id="userMenuBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span data-user-name></span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg></button>
        <div class="user-dropdown" id="userDropdown"><a href="/bookmarks/">我的收藏</a><a href="#">帳號設定</a><div class="user-dropdown-divider"></div><a href="#" data-sign-out>登出</a></div>
      </div>
      <button class="menu-btn" id="menuBtn" aria-label="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    </div>
  </div>
</nav>

<div class="adm-hero">
  <div class="adm-hero-inner">
    <div class="adm-hero-left">
      <div class="adm-hero-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
      <div>
        <div class="adm-hero-title">文章管理</div>
        <div class="adm-hero-sub" id="admHeroSub">載入中…</div>
      </div>
    </div>
    <button class="adm-new-btn" id="admNewBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>新增文章</button>
  </div>
</div>

<div class="adm-main">
  <div class="adm-toolbar">
    <div class="adm-search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="admSearch" placeholder="搜尋標題…" />
    </div>
    <select class="adm-filter" id="admCatFilter"><option value="">所有分類</option></select>
    <select class="adm-filter" id="admStatusFilter">
      <option value="">所有狀態</option>
      <option value="published">已發佈</option>
      <option value="draft">草稿</option>
      <option value="archived">已封存</option>
    </select>
    <span class="adm-count" id="admCount"></span>
  </div>
  <div class="adm-table-wrap">
    <div class="adm-loading" id="admLoading"><div style="font-size:24px;margin-bottom:8px;">⏳</div>載入中…</div>
    <table class="adm-table" id="admTable" style="display:none">
      <thead><tr>
        <th>標題</th><th>分類</th><th>狀態</th><th>精選</th>
        <th class="adm-col-author">作者</th>
        <th>發佈日期</th>
        <th class="adm-col-updated">最後更新</th>
        <th></th>
      </tr></thead>
      <tbody id="admTbody"></tbody>
    </table>
    <div class="adm-empty" id="admEmpty" style="display:none">找不到符合的文章</div>
  </div>
</div>

<div class="modal-overlay" id="loginModal" role="dialog" aria-modal="true">
  <div class="modal">
    <button class="modal-close" id="modalClose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <div class="modal-brand"><div class="brand-mark" aria-hidden="true"><svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="36" fill="#0d2444"/><path d="M 40 8 A 32 32 0 0 1 40 72" stroke="#d9b683" stroke-width="2.5" fill="none" stroke-linecap="round"/><text x="40" y="46" text-anchor="middle" font-family="Zen Old Mincho, Shippori Mincho, serif" font-size="22" font-weight="500" fill="#f6f3ec" letter-spacing="-1">一緒</text></svg></div><div class="brand-name">Issho<span class="hub">Hub</span></div></div>
    <div class="modal-tabs"><button class="modal-tab active" data-tab-btn="login" data-i18n="login_btn"></button><button class="modal-tab" data-tab-btn="register" data-i18n="login_register"></button></div>
    <div class="modal-error" id="loginError" style="display:none"></div>
    <div data-tab="login"><div class="social-login"><button class="btn-social" id="googleSignIn"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg><span data-i18n="login_google"></span></button></div><div class="modal-divider"><span data-i18n="login_or"></span></div><form class="login-form" id="loginForm"><div class="form-group"><label data-i18n="login_email"></label><input type="email" name="email" placeholder="your@email.com" autocomplete="email" required /></div><div class="form-group"><label data-i18n="login_password"></label><input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required /></div><button type="submit" class="btn-submit" data-i18n="login_submit"></button></form><div class="modal-footer"><a href="#" id="forgotPasswordLink" data-i18n="login_forgot"></a></div></div>
    <div data-tab="register" style="display:none"><form class="login-form" id="registerForm"><div class="form-group"><label data-i18n="register_name"></label><input type="text" name="name" placeholder="Your name" autocomplete="name" required /></div><div class="form-group"><label data-i18n="login_email"></label><input type="email" name="email" placeholder="your@email.com" autocomplete="email" required /></div><div class="form-group"><label data-i18n="login_password"></label><input type="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8" /></div><button type="submit" class="btn-submit" data-i18n="login_register"></button></form></div>
    <div data-tab="forgot" style="display:none"><p class="modal-sub" data-i18n="forgot_sub"></p><form class="login-form" id="forgotForm"><div class="form-group"><label data-i18n="login_email"></label><input type="email" name="email" placeholder="your@email.com" autocomplete="email" required /></div><button type="submit" class="btn-submit" data-i18n="forgot_submit"></button></form><div class="modal-footer"><a href="#" data-tab-btn="login" data-i18n="back_to_login"></a></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/assets/js/data.js"></script>
<script src="/assets/js/supabase-client.js?v=5"></script>
<script src="/assets/js/article-editor.js?v=3"></script>
<script src="/assets/js/search.js?v=4"></script>
<script src="/assets/js/core.js?v=5"></script>
<script>
(function () {
  'use strict';
  var C = window.IsshoCore;
  C.init(null);

  window.IsshoAuth.isAdmin().then(function(isAdmin) {
    if (!isAdmin) window.location.href = '/';
    else initAdmin();
  });

  var _all = [];

  function initAdmin() {
    if (window.IsshoEditor) window.IsshoEditor.init();

    var catSel = document.getElementById('admCatFilter');
    (window.ISSHO_DATA.nav || []).forEach(function(n) {
      var o = document.createElement('option');
      o.value = n.key; o.textContent = n.tc + ' / ' + n.en;
      catSel.appendChild(o);
    });

    document.getElementById('admNewBtn').addEventListener('click', function() {
      if (window.IsshoEditor) window.IsshoEditor.openEditor(null);
    });
    document.getElementById('admSearch').addEventListener('input', render);
    document.getElementById('admCatFilter').addEventListener('change', render);
    document.getElementById('admStatusFilter').addEventListener('change', render);

    loadAll();
  }

  async function loadAll() {
    var res = await window.IsshoAPI.fetchAllArticles();
    _all = res.data || [];
    document.getElementById('admLoading').style.display = 'none';
    document.getElementById('admTable').style.display = '';
    render();
  }

  function render() {
    var q  = document.getElementById('admSearch').value.toLowerCase();
    var ct = document.getElementById('admCatFilter').value;
    var st = document.getElementById('admStatusFilter').value;

    var list = _all.filter(function(a) {
      if (ct && a.category_key !== ct) return false;
      if (st && a.status !== st) return false;
      if (q && !(a.title_tc||'').toLowerCase().includes(q) && !(a.title_en||'').toLowerCase().includes(q)) return false;
      return true;
    });

    document.getElementById('admHeroSub').textContent = '共 ' + _all.length + ' 篇文章';
    document.getElementById('admCount').textContent = list.length + ' 篇';

    var tbody = document.getElementById('admTbody');
    var empty = document.getElementById('admEmpty');

    if (!list.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
    empty.style.display = 'none';

    var navMap = {};
    (window.ISSHO_DATA.nav || []).forEach(function(n) { navMap[n.key] = n.tc; });

    var badges = {
      published: '<span class="adm-badge adm-badge-published">● 已發佈</span>',
      draft:     '<span class="adm-badge adm-badge-draft">◐ 草稿</span>',
      archived:  '<span class="adm-badge adm-badge-archived">○ 封存</span>',
    };

    tbody.innerHTML = list.map(function(a) {
      var pub = a.published_at ? new Date(a.published_at).toLocaleDateString('zh-Hant',{year:'numeric',month:'2-digit',day:'2-digit'}) : '—';
      var upd = a.updated_at  ? new Date(a.updated_at).toLocaleDateString('zh-Hant',{year:'numeric',month:'2-digit',day:'2-digit'}) : '—';
      return '<tr class="adm-row" data-id="'+a.id+'">'
        + '<td class="adm-col-title"><div class="adm-title-tc">'+(a.title_tc||'（無標題）')+'</div>'+(a.title_en?'<div class="adm-title-en">'+a.title_en+'</div>':'')+'</td>'
        + '<td><span class="adm-cat-tag">'+(navMap[a.category_key]||a.category_key||'—')+'</span></td>'
        + '<td>'+(badges[a.status]||badges.draft)+'</td>'
        + '<td><button class="adm-featured-btn" data-id="'+a.id+'" data-featured="'+(a.featured?'1':'0')+'" title="點擊切換精選">'+(a.featured?'⭐':'☆')+'</button></td>'
        + '<td class="adm-date adm-col-author">'+(a.author||'—')+'</td>'
        + '<td class="adm-date">'+pub+'</td>'
        + '<td class="adm-date adm-col-updated">'+upd+'</td>'
        + '<td><div class="adm-actions">'
        + '<button class="adm-btn adm-edit-btn" data-id="'+a.id+'">✏️ 編輯</button>'
        + (a.slug?'<a class="adm-btn" href="/article/?slug='+a.slug+'" target="_blank">👁 預覽</a>':'')
        + '</div></td>'
        + '</tr>';
    }).join('');

    tbody.querySelectorAll('.adm-edit-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) { e.stopPropagation(); openEditor(btn.dataset.id); });
    });
    tbody.querySelectorAll('.adm-row').forEach(function(row) {
      row.addEventListener('click', function(e) { if (!e.target.closest('a') && !e.target.closest('.adm-featured-btn')) openEditor(row.dataset.id); });
    });
    tbody.querySelectorAll('.adm-featured-btn').forEach(function(btn) {
      btn.addEventListener('click', async function(e) {
        e.stopPropagation();
        var id = btn.dataset.id;
        var newVal = btn.dataset.featured !== '1';
        btn.textContent = '…';
        var client = window.IsshoAuth.getClient();
        var res = await client.from('articles').update({ featured: newVal }).eq('id', id).select().single();
        if (res.error) {
          btn.textContent = '❌';
          setTimeout(function(){ btn.textContent = btn.dataset.featured==='1'?'⭐':'☆'; }, 1500);
        } else {
          btn.dataset.featured = newVal ? '1' : '0';
          btn.textContent = newVal ? '⭐' : '☆';
          var idx = _all.findIndex(function(a){ return a.id === id; });
          if (idx !== -1) _all[idx].featured = newVal;
        }
      });
    });
  }

  async function openEditor(id) {
    var client = window.IsshoAuth.getClient();
    var res = await client.from('articles').select('*').eq('id', id).single();
    if (res.data && window.IsshoEditor) window.IsshoEditor.openEditor(res.data);
  }
})();
</script>
</body>
</html>
