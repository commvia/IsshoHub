<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IsshoHub Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', 'Noto Sans TC', sans-serif; font-size: 14px; color: #1a2233; background: #f4f6f9; height: 100vh; overflow: hidden; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; }

/* ── Auth gate ── */
#authGate {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #f4f6f9;
  z-index: 9999;
}
.auth-card {
  background: #fff; border-radius: 16px;
  padding: 40px; width: 380px;
  box-shadow: 0 8px 40px rgba(0,0,0,.12);
  text-align: center;
}
.auth-brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; }
.auth-brand-mark { width: 36px; height: 36px; background: #0d2444; border-radius: 10px; color: #fff; display: grid; place-items: center; font-size: 18px; font-weight: 700; }
.auth-brand-name { font-size: 20px; font-weight: 700; color: #0d2444; }
.auth-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.auth-sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
.auth-error { background: #fef2f2; color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
.auth-form { display: flex; flex-direction: column; gap: 12px; }
.auth-input { border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; outline: none; transition: border .15s; }
.auth-input:focus { border-color: #3b5bdb; }
.auth-submit { background: #0d2444; color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 600; transition: background .15s; }
.auth-submit:hover { background: #1a3a6e; }
.auth-checking { color: #6b7280; font-size: 13px; margin-top: 8px; }

/* ── Layout ── */
.admin-layout { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 220px; min-width: 220px;
  background: #0d2444;
  display: flex; flex-direction: column;
  color: #fff;
  overflow-y: auto;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sidebar-mark { width: 30px; height: 30px; background: rgba(255,255,255,.15); border-radius: 8px; display: grid; place-items: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
.sidebar-title { font-size: 15px; font-weight: 700; }
.sidebar-sub   { font-size: 10px; color: rgba(255,255,255,.45); }

.sidebar-nav { padding: 12px 10px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: 8px;
  color: rgba(255,255,255,.65);
  font-size: 13.5px; font-weight: 500;
  transition: all .15s;
  cursor: pointer;
  border: none; background: transparent; width: 100%; text-align: left;
}
.sidebar-item:hover { background: rgba(255,255,255,.08); color: #fff; }
.sidebar-item.active { background: rgba(255,255,255,.14); color: #fff; font-weight: 600; }
.sidebar-item svg { flex-shrink: 0; opacity: .8; }
.sidebar-item.active svg { opacity: 1; }

.sidebar-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: .08em;
  color: rgba(255,255,255,.35); text-transform: uppercase;
  padding: 12px 10px 4px;
}

.sidebar-footer {
  padding: 12px 10px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.sidebar-user {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
}
.sidebar-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,.2); display: grid; place-items: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name  { font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,.9); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user-role  { font-size: 10.5px; color: rgba(255,255,255,.4); }
.sidebar-signout { background: transparent; border: none; color: rgba(255,255,255,.45); font-size: 11px; padding: 2px 4px; cursor: pointer; transition: color .15s; white-space: nowrap; }
.sidebar-signout:hover { color: #fff; }

/* Main area */
.admin-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.admin-topbar {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 0 24px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.admin-topbar-title { font-size: 16px; font-weight: 700; color: #0d2444; }
.admin-topbar-actions { display: flex; gap: 8px; }

.admin-content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── Common UI ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  border: none; transition: all .15s; cursor: pointer;
}
.btn-primary { background: #3b5bdb; color: #fff; }
.btn-primary:hover { background: #2f4cad; }
.btn-ghost { background: #f3f4f6; color: #374151; }
.btn-ghost:hover { background: #e5e7eb; }
.btn-danger { background: #fef2f2; color: #dc2626; }
.btn-danger:hover { background: #fee2e2; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Stats row */
.stats-row { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card {
  background: #fff; border-radius: 12px; padding: 16px 20px;
  flex: 1; min-width: 120px;
  border: 1px solid #e5e7eb;
}
.stat-num { font-size: 28px; font-weight: 700; color: #0d2444; line-height: 1; }
.stat-label { font-size: 12px; color: #6b7280; margin-top: 4px; }

/* Filters bar */
.filters-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-input {
  border: 1.5px solid #e5e7eb; border-radius: 8px;
  padding: 7px 12px; font-size: 13px; font-family: inherit;
  outline: none; background: #fff; transition: border .15s;
}
.filter-input:focus { border-color: #3b5bdb; }
.filter-select {
  border: 1.5px solid #e5e7eb; border-radius: 8px;
  padding: 7px 12px; font-size: 13px; font-family: inherit;
  background: #fff; outline: none; cursor: pointer;
}

/* Article table */
.article-table-wrap {
  background: #fff; border-radius: 12px;
  border: 1px solid #e5e7eb; overflow: hidden;
}
.article-table { width: 100%; border-collapse: collapse; }
.article-table th {
  background: #f9fafb; padding: 10px 14px;
  font-size: 11.5px; font-weight: 600; color: #6b7280;
  text-align: left; text-transform: uppercase; letter-spacing: .04em;
  border-bottom: 1px solid #e5e7eb;
  white-space: nowrap;
}
.article-table td {
  padding: 12px 14px; border-bottom: 1px solid #f3f4f6;
  font-size: 13px; vertical-align: middle;
}
.article-table tr:last-child td { border-bottom: none; }
.article-table tr:hover td { background: #fafafa; }
.article-table .col-title { max-width: 300px; }
.art-title { font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; display: block; }
.art-slug  { font-size: 11px; color: #9ca3af; margin-top: 2px; }
.art-status {
  display: inline-block; padding: 2px 8px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
}
.art-status.published { background: #dcfce7; color: #16a34a; }
.art-status.draft     { background: #fef9c3; color: #a16207; }
.art-status.archived  { background: #f3f4f6; color: #6b7280; }
.art-cat { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #eff6ff; color: #1d4ed8; }
.art-actions { display: flex; gap: 6px; white-space: nowrap; }
.art-featured-star { color: #f59e0b; font-size: 14px; }

/* Empty state */
.empty-state {
  text-align: center; padding: 60px 20px; color: #9ca3af;
}
.empty-state svg { opacity: .3; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* Loading */
.loading-dots { display: flex; gap: 6px; justify-content: center; padding: 40px; }
.loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: #3b5bdb; animation: dot .9s infinite; }
.loading-dots span:nth-child(2) { animation-delay: .15s; }
.loading-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes dot { 0%,80%,100% { opacity:.2; transform:scale(.8); } 40% { opacity:1; transform:scale(1); } }

/* Section panels (Settings / Hot Search open as overlays) */
.panel-trigger-section {
  background: #fff; border-radius: 12px; border: 1px solid #e5e7eb;
  padding: 32px; text-align: center;
}
.panel-trigger-section h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: #0d2444; }
.panel-trigger-section p  { font-size: 13px; color: #6b7280; margin-bottom: 24px; line-height: 1.6; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { width: 60px; min-width: 60px; }
  .sidebar-title, .sidebar-sub, .sidebar-item span,
  .sidebar-section-label, .sidebar-user-info, .sidebar-signout { display: none; }
  .sidebar-brand { justify-content: center; padding: 16px 8px; }
  .sidebar-item { justify-content: center; padding: 10px; }
  .sidebar-user { justify-content: center; }
  .admin-content { padding: 16px; }
}
</style>
</head>
<body>

<!-- ── Auth Gate ── -->
<div id="authGate">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-brand-mark">一</div>
      <div class="auth-brand-name">IsshoHub</div>
    </div>
    <div class="auth-title">管理員登入</div>
    <div class="auth-sub">此頁面僅限管理員存取</div>
    <div class="auth-error" id="authError"></div>
    <form class="auth-form" id="authForm">
      <input class="auth-input" type="email" id="authEmail" placeholder="管理員 Email" autocomplete="email" required />
      <input class="auth-input" type="password" id="authPassword" placeholder="密碼" autocomplete="current-password" required />
      <button class="auth-submit" type="submit">登入</button>
    </form>
    <div class="auth-checking" id="authChecking">驗證中…</div>
  </div>
</div>

<!-- ── Admin Shell (hidden until auth) ── -->
<div class="admin-layout" id="adminShell" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-mark">一</div>
      <div>
        <div class="sidebar-title">IsshoHub</div>
        <div class="sidebar-sub">Admin Panel</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-label">內容管理</div>
      <button class="sidebar-item active" data-tab="articles">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8M16 17H8M10 9H8"/></svg>
        <span>文章管理</span>
      </button>

      <div class="sidebar-section-label">設定</div>
      <button class="sidebar-item" data-tab="settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>網站設定</span>
      </button>
      <button class="sidebar-item" data-tab="hotsearch">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <span>熱門搜尋</span>
      </button>

      <div class="sidebar-section-label">快速連結</div>
      <button class="sidebar-item" onclick="window.open('/', '_blank')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9"/></svg>
        <span>查看網站</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">A</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebarName">管理員</div>
          <div class="sidebar-user-role">Admin</div>
        </div>
        <button class="sidebar-signout" id="signOutBtn" title="登出">登出</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-title" id="topbarTitle">文章管理</div>
      <div class="admin-topbar-actions" id="topbarActions">
        <button class="btn btn-primary" id="newArticleBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          新增文章
        </button>
      </div>
    </div>

    <div class="admin-content" id="adminContent">
      <!-- Rendered by JS -->
    </div>
  </div>
</div>

<!-- ── CMS overlay panels ── -->
<!-- Article Editor overlay injected by article-editor.js -->
<!-- Site Settings overlay injected by site-settings.js -->
<!-- Hot Search overlay injected by hot-search-manager.js -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/assets/js/data.js"></script>
<script src="/assets/js/supabase-client.js"></script>
<script src="/assets/js/article-editor.js?v=2"></script>
<script src="/assets/js/site-settings.js"></script>
<script src="/assets/js/hot-search-manager.js"></script>
<script>
(function () {
  'use strict';

  /* ── State ── */
  let currentTab     = 'articles';
  let allArticles    = [];
  let filteredArticles = [];
  let filterSearch   = '';
  let filterCat      = '';
  let filterStatus   = '';

  const TITLES = { articles: '文章管理', settings: '網站設定', hotsearch: '熱門搜尋' };

  /* ════════════════════════════════════════
     AUTH
  ════════════════════════════════════════ */
  async function checkAuth() {
    document.getElementById('authChecking').style.display = 'block';
    document.getElementById('authForm').style.display = 'none';

    const user = await window.IsshoAuth.getUser();
    if (user) {
      const admin = await window.IsshoAuth.isAdmin();
      if (admin) {
        enterAdmin(user);
        return;
      }
    }
    /* Not admin — show login form */
    document.getElementById('authChecking').style.display = 'none';
    document.getElementById('authForm').style.display = 'flex';
  }

  document.getElementById('authForm').addEventListener('submit', async e => {
    e.preventDefault();
    const email    = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const errEl    = document.getElementById('authError');
    errEl.style.display = 'none';

    const { error } = await window.IsshoAuth.signInWithEmail(email, password);
    if (error) {
      errEl.textContent = error.message;
      errEl.style.display = 'block';
      return;
    }
    const admin = await window.IsshoAuth.isAdmin();
    if (!admin) {
      await window.IsshoAuth.signOut();
      errEl.textContent = '此帳號沒有管理員權限';
      errEl.style.display = 'block';
      return;
    }
    const user = await window.IsshoAuth.getUser();
    enterAdmin(user);
  });

  function enterAdmin(user) {
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('adminShell').style.display = 'flex';

    const name = user.user_metadata?.full_name || user.email.split('@')[0];
    document.getElementById('sidebarName').textContent  = name;
    document.getElementById('sidebarAvatar').textContent = name[0].toUpperCase();

    /* Wire CMS modules */
    window.IsshoEditor.init();
    window.IsshoSettings.init();
    window.IsshoHotSearch.init();

    /* Wire sidebar + topbar */
    document.querySelectorAll('.sidebar-item[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
    });
    document.getElementById('signOutBtn').addEventListener('click', async () => {
      await window.IsshoAuth.signOut();
      location.reload();
    });
    document.getElementById('newArticleBtn').addEventListener('click', () => {
      window.IsshoEditor.openEditor(null);
    });

    switchTab('articles');
  }

  /* ════════════════════════════════════════
     TAB SWITCHING
  ════════════════════════════════════════ */
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.sidebar-item[data-tab]').forEach(b => {
      b.classList.toggle('active', b.getAttribute('data-tab') === tab);
    });
    document.getElementById('topbarTitle').textContent = TITLES[tab] || tab;

    const actions = document.getElementById('topbarActions');
    actions.innerHTML = tab === 'articles'
      ? `<button class="btn btn-primary" id="newArticleBtn">
           <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
           新增文章
         </button>`
      : '';
    if (tab === 'articles') {
      document.getElementById('newArticleBtn')?.addEventListener('click', () => window.IsshoEditor.openEditor(null));
    }

    const content = document.getElementById('adminContent');
    if (tab === 'articles') {
      renderArticlesTab(content);
    } else if (tab === 'settings') {
      renderPanelTrigger(content, {
        title: '網站設定',
        desc: '管理主頁 Hero 圖片與文字、跑馬燈內容、即時匯率顯示。\n所有設定儲存於 Supabase，網站及未來 App 均自動讀取。',
        btnLabel: '開啟網站設定',
        onOpen: () => window.IsshoSettings.open(),
      });
    } else if (tab === 'hotsearch') {
      renderPanelTrigger(content, {
        title: '熱門搜尋管理',
        desc: '管理首頁「熱門搜尋」標籤，可調整順序、新增刪除關鍵字（繁中＋英文）。\n儲存於 Supabase，網站及 App 搜尋功能自動讀取。',
        btnLabel: '開啟熱門搜尋',
        onOpen: () => window.IsshoHotSearch.open(),
      });
    }
  }

  /* ════════════════════════════════════════
     ARTICLES TAB
  ════════════════════════════════════════ */
  function renderArticlesTab(container) {
    container.innerHTML = `
      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-num" id="statTotal">…</div><div class="stat-label">全部文章</div></div>
        <div class="stat-card"><div class="stat-num" id="statPublished" style="color:#16a34a">…</div><div class="stat-label">已發布</div></div>
        <div class="stat-card"><div class="stat-num" id="statDraft" style="color:#a16207">…</div><div class="stat-label">草稿</div></div>
        <div class="stat-card"><div class="stat-num" id="statFeatured" style="color:#7c3aed">…</div><div class="stat-label">精選</div></div>
      </div>
      <div class="filters-bar">
        <input class="filter-input" id="filterSearch" placeholder="🔍 搜尋標題…" style="flex:1;min-width:200px;" />
        <select class="filter-select" id="filterCat">
          <option value="">全部分類</option>
        </select>
        <select class="filter-select" id="filterStatus">
          <option value="">全部狀態</option>
          <option value="published">已發布</option>
          <option value="draft">草稿</option>
          <option value="archived">已封存</option>
        </select>
        <button class="btn btn-ghost" id="refreshBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12a9 9 0 009 9 9.75 9.75 0 006.74-2.74L21 16"/><path d="M21 21v-5h-5"/><path d="M21 12a9 9 0 00-9-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          重新整理
        </button>
      </div>
      <div class="article-table-wrap">
        <div class="loading-dots" id="tableLoading"><span></span><span></span><span></span></div>
        <table class="article-table" id="articleTable" style="display:none">
          <thead>
            <tr>
              <th>標題</th>
              <th>分類</th>
              <th>狀態</th>
              <th>更新日期</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="articleTbody"></tbody>
        </table>
        <div class="empty-state" id="tableEmpty" style="display:none">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
          <p>找不到符合條件的文章</p>
        </div>
      </div>`;

    loadArticles();

    document.getElementById('filterSearch').addEventListener('input', e => { filterSearch = e.target.value; applyFilters(); });
    document.getElementById('filterCat').addEventListener('change', e => { filterCat = e.target.value; applyFilters(); });
    document.getElementById('filterStatus').addEventListener('change', e => { filterStatus = e.target.value; applyFilters(); });
    document.getElementById('refreshBtn').addEventListener('click', () => { allArticles = []; loadArticles(); });

    /* Populate category filter */
    window.IsshoAPI.fetchCategories().then(({ data }) => {
      const sel = document.getElementById('filterCat');
      if (sel && data) {
        data.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.key; opt.textContent = c.name_tc;
          sel.appendChild(opt);
        });
      }
    });
  }

  async function loadArticles() {
    document.getElementById('tableLoading').style.display = 'flex';
    document.getElementById('articleTable').style.display = 'none';
    document.getElementById('tableEmpty').style.display   = 'none';

    const { data } = await window.IsshoAPI.fetchAllArticles();
    allArticles = data;

    /* Stats */
    document.getElementById('statTotal').textContent     = data.length;
    document.getElementById('statPublished').textContent = data.filter(a => a.status === 'published').length;
    document.getElementById('statDraft').textContent     = data.filter(a => a.status === 'draft').length;
    document.getElementById('statFeatured').textContent  = data.filter(a => a.featured).length;

    applyFilters();
  }

  function applyFilters() {
    const q = filterSearch.toLowerCase();
    filteredArticles = allArticles.filter(a => {
      const title = ((a.title_tc || '') + ' ' + (a.title_en || '')).toLowerCase();
      if (q && !title.includes(q)) return false;
      if (filterCat    && a.category_key !== filterCat)   return false;
      if (filterStatus && a.status       !== filterStatus) return false;
      return true;
    });
    renderTable();
  }

  function renderTable() {
    const tbody   = document.getElementById('articleTbody');
    const table   = document.getElementById('articleTable');
    const loading = document.getElementById('tableLoading');
    const empty   = document.getElementById('tableEmpty');

    loading.style.display = 'none';

    if (!filteredArticles.length) {
      table.style.display = 'none';
      empty.style.display = 'flex';
      return;
    }

    table.style.display = 'table';
    empty.style.display = 'none';

    tbody.innerHTML = filteredArticles.map(a => {
      const title = a.title_tc || a.title_en || '（無標題）';
      const date  = a.updated_at
        ? new Date(a.updated_at).toLocaleDateString('zh-Hant', { month: 'short', day: 'numeric', year: 'numeric' })
        : '—';
      const status = a.status || 'draft';
      return `
        <tr>
          <td class="col-title">
            <a class="art-title" href="/article/?slug=${a.slug}" target="_blank" title="${title}">${a.featured ? '<span class="art-featured-star" title="精選">★</span> ' : ''}${title}</a>
            <div class="art-slug">${a.slug || ''}</div>
          </td>
          <td><span class="art-cat">${a.category_key || '—'}</span></td>
          <td><span class="art-status ${status}">${status === 'published' ? '已發布' : status === 'draft' ? '草稿' : '已封存'}</span></td>
          <td style="white-space:nowrap;color:#6b7280">${date}</td>
          <td>
            <div class="art-actions">
              <button class="btn btn-ghost btn-sm" data-edit="${a.id}">編輯</button>
              <button class="btn btn-danger btn-sm" data-delete="${a.id}" data-title="${title.replace(/"/g, '&quot;')}">刪除</button>
            </div>
          </td>
        </tr>`;
    }).join('');

    /* Wire action buttons */
    tbody.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = parseInt(btn.getAttribute('data-edit'));
        const article = allArticles.find(a => a.id === id);
        if (article) window.IsshoEditor.openEditor(article);
      });
    });
    tbody.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id    = parseInt(btn.getAttribute('data-delete'));
        const title = btn.getAttribute('data-title');
        if (!confirm(`確定要刪除「${title}」？此操作無法復原。`)) return;
        btn.disabled = true; btn.textContent = '刪除中…';
        const { error } = await window.IsshoAPI.deleteArticle(id);
        if (error) { alert('刪除失敗：' + error.message); btn.disabled = false; btn.textContent = '刪除'; return; }
        allArticles = allArticles.filter(a => a.id !== id);
        applyFilters();
      });
    });
  }

  /* ════════════════════════════════════════
     PANEL TRIGGER (Settings / Hot Search)
  ════════════════════════════════════════ */
  function renderPanelTrigger(container, { title, desc, btnLabel, onOpen }) {
    container.innerHTML = `
      <div class="panel-trigger-section">
        <h3>${title}</h3>
        <p>${desc.replace(/\n/g, '<br>')}</p>
        <button class="btn btn-primary" id="openPanelBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
          ${btnLabel}
        </button>
      </div>`;
    document.getElementById('openPanelBtn').addEventListener('click', onOpen);
  }

  /* ════════════════════════════════════════
     BOOT
  ════════════════════════════════════════ */
  checkAuth();

})();
</script>
</body>
</html>
