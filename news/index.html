<script>
(function(){
  var D=window.ISSHO_DATA,meta=(D.cat_meta||{})['news']||{};
  var iconEl=document.getElementById('catIconSvg');
  if(iconEl&&meta.icon) iconEl.innerHTML=meta.icon;
  window.IsshoCategory.init('news');
  (function(){
    var C=['HKD','TWD','USD','EUR','GBP','CAD','AUD','SGD'];
    var tEl=document.getElementById('tickerRate'),fi=document.getElementById('fxInput'),fo=document.getElementById('fxOutput'),ff=document.getElementById('fxFrom'),fr=document.getElementById('fxRates'),fRoot=document.getElementById('fx'),rates={},last='input';
    document.getElementById('fxTrigger').addEventListener('click',function(){fRoot.classList.toggle('open');});
    document.getElementById('fxClose').addEventListener('click',function(){fRoot.classList.remove('open');});
    document.addEventListener('click',function(e){if(fRoot&&!fRoot.contains(e.target))fRoot.classList.remove('open');});
    var fmt=function(v){return v>=10?v.toFixed(2):v.toFixed(3);},fmtJ=function(v){return String(Math.round(v));};
    function cFF(){var a=parseFloat(fi.value),c=ff.value;if(!isNaN(a)&&rates[c])fo.value=fmtJ(a*rates[c]);}
    function cFJ(){var j=parseFloat(fo.value),c=ff.value;if(!isNaN(j)&&rates[c])fi.value=fmt(j/rates[c]);}
    fi.addEventListener('input',function(){last='input';cFF();});
    fo.addEventListener('input',function(){last='output';cFJ();});
    ff.addEventListener('change',function(){document.getElementById('fxFromLabel').textContent=ff.value;last==='output'?cFJ():cFF();});
    fetch('https://open.er-api.com/v6/latest/JPY').then(function(r){return r.json();}).then(function(j){
      if(j.result!=='success'||!j.rates)return;
      C.filter(function(c){return j.rates[c];}).forEach(function(c){rates[c]=1/j.rates[c];});
      if(tEl){var p=C.filter(function(c){return rates[c];}).map(function(c){return c+' <b>&#165;'+fmt(rates[c])+'</b>';});var i=0;var s=function(){tEl.innerHTML=p.slice(i,i+2).join('&nbsp;&nbsp;');i=(i+2)%p.length;};s();setInterval(s,3000);}
      if(fr)fr.innerHTML=C.filter(function(c){return rates[c];}).map(function(c){return '<div class="fx-rate-item"><div class="k">'+c+'/JPY</div><div class="v">'+fmt(rates[c])+'</div></div>';}).join('');
      if(fi&&fi.value)cFF();
    }).catch(function(){});
  })();
})();
</script>
