<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
(function () {
  const D = window.ISSHO_DATA;
  const C = window.IsshoCore;
  function getLang() { return C.getLang(); }

  /* ── Page config ── */
  const PAGE = {
    key:     'life',
    tc:      '日常手續',
    en:      'Daily Life',
    desc_tc: '駕照切換、銀行開戶、電話卡、交通規則——移居日本後所有日常必辦手續的完整雙語指南。',
    desc_en: 'Driver\'s licence conversion, bank accounts, SIM cards, traffic rules — a complete guide to everyday admin after moving to Japan.',
    water:   '生活',
    count:   93,
    subs:    [{"tc":"外免切替","en":"Licence Conversion","count":18},{"tc":"交通規則","en":"Traffic Rules","count":12},{"tc":"銀行戶口","en":"Bank Accounts","count":22},{"tc":"電話卡","en":"SIM & Phone Plans","count":20},{"tc":"其他","en":"Other","count":21}],
  };

  let _articles = null;
  let activeSub = 'all';

  /* ── Supabase article → card HTML ── */
  function sbCardHTML(a, opts) {
    opts = opts || {};
    const lang    = getLang();
    const title   = lang === 'tc' ? (a.title_tc || a.title_en) : (a.title_en || a.title_tc);
    const excerpt = lang === 'tc' ? (a.excerpt_tc || '') : (a.excerpt_en || '');
    const img     = a.cover_image_url || 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=800&q=80';
    const cat     = a.category_key || '';
    const author  = a.author || '';
    const date    = a.published_at ? new Date(a.published_at).toLocaleDateString(lang === 'tc' ? 'zh-Hant' : 'en', { year:'numeric', month:'short', day:'numeric' }) : '';
    const readTime = lang === 'tc' ? (a.read_time || 5) + ' 分鐘閱讀' : (a.read_time || 5) + ' min read';
    return `
      <article class="card ${opts.featured ? 'featured' : ''}">
        <a class="card-media" href="/article/?slug=${a.slug}" style="background-image:url('${img}')">
          <span class="card-tag cat-${cat}">${cat}</span>
        </a>
        <a class="card-edit-chip" href="/article/?slug=${a.slug}&edit=1" title="編輯文章">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </a>
        <div class="card-body">
          <h3 class="card-title">${title}</h3>
          <p class="card-excerpt">${excerpt}</p>
          <div class="card-meta">
            <span class="author">${author}</span>
            <span class="dot"></span>
            <span>${date}</span>
            <span class="reading">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              ${readTime}
            </span>
          </div>
        </div>
      </article>`;
  }

  async function loadArticles() {
    if (_articles) return _articles;
    const { data } = await window.IsshoAPI.fetchArticles({ category: PAGE.key, limit: 20 });
    _articles = data || [];
    return _articles;
  }

  /* ── Render cat hero ── */
  function renderCatHero() {
    const lang = getLang();
    document.getElementById('catHeroTitle').textContent          = lang === 'tc' ? PAGE.tc : PAGE.en;
    document.getElementById('catHeroEn').textContent             = lang === 'tc' ? PAGE.en : PAGE.tc;
    document.getElementById('catHeroDesc').textContent           = lang === 'tc' ? PAGE.desc_tc : PAGE.desc_en;
    document.getElementById('heroBreadcrumbCurrent').textContent = lang === 'tc' ? PAGE.tc : PAGE.en;
    document.getElementById('catHeroWatermark').textContent      = PAGE.water;
    document.getElementById('catStatLabel').textContent          = lang === 'tc' ? '篇文章' : 'articles';
    const subsEl = document.getElementById('catStatSubs');
    if (subsEl) subsEl.textContent = lang === 'tc' ? '個子分類' : 'sub-categories';
  }

  /* ── Render subcat nav ── */
  function renderSubcatNav() {
    const scrollEl = document.getElementById('subcatScroll');
    if (!scrollEl || !PAGE.subs.length) return;
    const lang = getLang();
    const all  = [{ key: 'all', tc: '全部', en: 'All', count: PAGE.count }];
    const tabs = all.concat(PAGE.subs.map((s, i) => ({ key: i, tc: s.tc, en: s.en, count: s.count })));
    scrollEl.innerHTML = tabs.map(tab => `
      <a href="javascript:void(0)" class="subcat-tab${tab.key === activeSub ? ' active' : ''}" data-sub="${tab.key}">
        ${lang === 'tc' ? tab.tc : tab.en}<span class="count">${tab.count}</span>
      </a>`).join('');
    scrollEl.addEventListener('click', e => {
      const tab = e.target.closest('.subcat-tab');
      if (!tab) return;
      activeSub = tab.getAttribute('data-sub');
      scrollEl.querySelectorAll('.subcat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  }

  /* ── Render featured ── */
  function renderFeatured() {
    loadArticles().then(articles => {
      const featured = articles.find(a => a.featured) || articles[0];
      const el = document.getElementById('catFeaturedGrid');
      if (!el) return;
      if (featured) {
        el.innerHTML = sbCardHTML(featured, { featured: true });
      } else {
        el.innerHTML = '<p style="color:var(--ink-3);padding:20px 0">暫無文章</p>';
      }
    });
  }

  /* ── Render articles ── */
  function renderArticles() {
    const lang = getLang();
    const titleEl = document.getElementById('catArticlesTitle');
    if (titleEl) titleEl.textContent = lang === 'tc' ? '最新' + PAGE.tc + '文章' : 'Latest ' + PAGE.en + ' articles';
    loadArticles().then(articles => {
      const el = document.getElementById('catArticlesGrid');
      if (!el) return;
      const rest = articles.filter(a => !a.featured);
      if (rest.length) {
        el.innerHTML = rest.map(a => sbCardHTML(a)).join('');
        const countEl = document.getElementById('catStatCount');
        if (countEl) countEl.textContent = articles.length;
      } else {
        el.innerHTML = '<p style="color:var(--ink-3);padding:20px 0">暫無文章</p>';
      }
    });
  }

  function renderAll() {
    renderCatHero();
    renderSubcatNav();
    renderFeatured();
    renderArticles();
  }

  window.onLangChange = function () { _articles = null; renderAll(); };
  C.init(PAGE.key);
  renderAll();

  /* ── FX Calculator ── */
  (function initFX() {
    const CURRENCIES = ['HKD','TWD','USD','EUR','GBP','CAD','AUD','SGD'];
    const tickerEl = document.getElementById('tickerRate');
    const fxInput  = document.getElementById('fxInput');
    const fxOutput = document.getElementById('fxOutput');
    const fxFrom   = document.getElementById('fxFrom');
    const fxRates  = document.getElementById('fxRates');
    const fxRoot   = document.getElementById('fx');
    let rates = {}, lastEdited = 'input';
    document.getElementById('fxTrigger').addEventListener('click', () => fxRoot.classList.toggle('open'));
    document.getElementById('fxClose').addEventListener('click',   () => fxRoot.classList.remove('open'));
    document.addEventListener('click', e => { if (fxRoot && !fxRoot.contains(e.target)) fxRoot.classList.remove('open'); });
    const fmt    = v => v >= 10 ? v.toFixed(2) : v.toFixed(3);
    const fmtJPY = v => String(Math.round(v));
    const calcForeign = () => { const a = parseFloat(fxInput.value), c = fxFrom.value; if (!isNaN(a) && rates[c]) fxOutput.value = fmtJPY(a * rates[c]); };
    const calcJPY     = () => { const j = parseFloat(fxOutput.value), c = fxFrom.value; if (!isNaN(j) && rates[c]) fxInput.value = fmt(j / rates[c]); };
    fxInput.addEventListener('input',  () => { lastEdited = 'input';  calcForeign(); });
    fxOutput.addEventListener('input', () => { lastEdited = 'output'; calcJPY(); });
    fxFrom.addEventListener('change',  () => { document.getElementById('fxFromLabel').textContent = fxFrom.value; lastEdited === 'output' ? calcJPY() : calcForeign(); });
    fetch('https://open.er-api.com/v6/latest/JPY')
      .then(r => r.json())
      .then(json => {
        if (json.result !== 'success' || !json.rates) return;
        CURRENCIES.filter(c => json.rates[c]).forEach(c => { rates[c] = 1 / json.rates[c]; });
        if (tickerEl) {
          const parts = CURRENCIES.filter(c => rates[c]).map(c => `${c} <b>¥${fmt(rates[c])}</b>`);
          let idx = 0;
          const show = () => { tickerEl.innerHTML = parts.slice(idx, idx+2).join('&nbsp;&nbsp;'); idx = (idx+2) % parts.length; };
          show(); setInterval(show, 3000);
        }
        if (fxRates) fxRates.innerHTML = CURRENCIES.filter(c => rates[c]).map(c =>
          `<div class="fx-rate-item"><div class="k">${c}/JPY</div><div class="v">${fmt(rates[c])}</div></div>`).join('');
        if (fxInput.value) calcForeign();
      }).catch(() => {});
  })();

  if (window.IsshoSearch) window.IsshoSearch.init();
})();
</script>
</body>
