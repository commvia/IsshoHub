<style>
  /* ── Brand mark override ── */
  .brand .brand-mark,.footer-brand .brand-mark,.modal-brand .brand-mark,.mobile-menu-head .brand-mark{background:transparent!important;border:0!important;padding:0!important;color:inherit!important;font-size:0!important;line-height:0!important;width:auto!important;height:auto!important;box-shadow:none!important;border-radius:0!important;overflow:visible!important;display:inline-flex;align-items:center;justify-content:center;}
  .brand .brand-mark svg,.footer-brand .brand-mark svg,.modal-brand .brand-mark svg,.mobile-menu-head .brand-mark svg{display:block;width:38px;height:38px;}
  .modal-brand .brand-mark svg{width:44px;height:44px;}.footer-brand .brand-mark svg{width:42px;height:42px;}
  .brand-name .hub{color:#a8762f;}.footer-brand .brand-name .hub{color:#d9b683;}

  /* ── Reading progress bar ── */
  .reading-progress{position:fixed;top:0;left:0;width:0%;height:3px;background:linear-gradient(90deg,#0d2444,#d9b683);z-index:9999;transition:width .1s linear;pointer-events:none;}

  /* ── Article hero ── */
  .article-hero{position:relative;background:var(--navy,#0d2444);overflow:hidden;}
  .article-hero-body{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:52px 24px 44px;}
  .article-hero-no-img .article-hero-body{padding:40px 24px 36px;}

  /* ── Cover image (shown below hero, full clarity) ── */
  .article-cover-img{width:100%;aspect-ratio:16/9;object-fit:cover;background-size:cover;background-position:center;display:block;border-radius:0;}
  .article-hero-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(246,243,236,.45);margin-bottom:20px;flex-wrap:wrap;}
  .article-hero-breadcrumb a{color:rgba(217,182,131,.75);text-decoration:none;transition:color .15s;}
  .article-hero-breadcrumb a:hover{color:#d9b683;}
  .article-hero-breadcrumb .sep{opacity:.4;}
  .article-hero-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#d9b683;background:rgba(217,182,131,.12);border:1px solid rgba(217,182,131,.25);padding:4px 12px;border-radius:999px;margin-bottom:18px;}
  .article-hero-title{font-size:clamp(24px,4.5vw,42px);font-weight:800;color:#f6f3ec;line-height:1.2;margin:0 0 16px;font-family:'Noto Sans TC','Zen Kaku Gothic New',sans-serif;letter-spacing:-.5px;}
  .article-hero-excerpt{font-size:16px;color:rgba(246,243,236,.7);line-height:1.75;max-width:640px;margin:0 0 24px;}
  .article-hero-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:13px;color:rgba(246,243,236,.5);}
  .article-hero-avatar{width:34px;height:34px;border-radius:50%;background:rgba(217,182,131,.2);border:1.5px solid rgba(217,182,131,.4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#d9b683;flex-shrink:0;}
  .article-hero-author{font-weight:600;color:rgba(246,243,236,.85);}
  .article-hero-dot{width:3px;height:3px;border-radius:50%;background:rgba(246,243,236,.3);}
  .article-hero-time{display:flex;align-items:center;gap:4px;}
  .article-hero-time svg{opacity:.6;}

  /* ── No-image hero variant ── */
  .article-hero-no-img{background:var(--navy,#0d2444);}
  .article-hero-no-img .article-hero-title{font-size:clamp(22px,3.5vw,36px);}

  /* ── Article body layout ── */
  .article-layout{max-width:800px;margin:0 auto;padding:0 24px 80px;}
  .article-body-wrap{padding-top:40px;}

  /* ── Prose styles ── */
  .article-prose{font-size:17px;line-height:1.9;color:var(--ink-1,#2a2a2a);font-family:'Noto Serif TC','Noto Sans TC',sans-serif;}
  .article-prose h2{font-size:22px;font-weight:700;color:var(--navy-ink,#0a1a31);margin:44px 0 16px;font-family:'Noto Sans TC','Zen Kaku Gothic New',sans-serif;line-height:1.35;padding-bottom:10px;border-bottom:2px solid var(--line,#e4dfd3);}
  .article-prose h3{font-size:18px;font-weight:700;color:var(--navy-ink,#0a1a31);margin:36px 0 12px;font-family:'Noto Sans TC',sans-serif;line-height:1.4;}
  .article-prose h4{font-size:16px;font-weight:700;color:var(--navy-ink,#0a1a31);margin:28px 0 10px;}
  .article-prose p{margin-bottom:22px;}
  .article-prose ul,.article-prose ol{padding-left:26px;margin-bottom:22px;}
  .article-prose li{margin-bottom:10px;line-height:1.75;}
  .article-prose blockquote{border-left:4px solid var(--accent,#378ADD);padding:16px 20px;margin:32px 0;background:rgba(55,138,221,.05);border-radius:0 8px 8px 0;color:var(--ink-2,#4a5366);font-style:italic;font-size:16px;}
  .article-prose blockquote p{margin:0;}
  .article-prose a{color:var(--accent,#378ADD);text-decoration:underline;text-underline-offset:2px;}
  .article-prose a:hover{color:var(--accent-ink,#1f6bb8);}
  .article-prose img{max-width:100%;border-radius:8px;margin:28px 0;display:block;}
  .article-prose code{font-size:14px;background:var(--surface-2,#f2ede6);padding:2px 6px;border-radius:4px;font-family:monospace;}
  .article-prose hr{border:none;border-top:1px solid var(--line,#e4dfd3);margin:36px 0;}
  .article-prose strong{color:var(--navy-ink,#0a1a31);font-weight:700;}
  .article-prose table{width:100%;border-collapse:collapse;margin:28px 0;font-size:15px;overflow-x:auto;display:block;}
  .article-prose th{background:var(--navy,#0d2444);color:#f6f3ec;font-weight:600;padding:10px 14px;text-align:left;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;font-size:13px;letter-spacing:.02em;}
  .article-prose td{padding:10px 14px;border-bottom:1px solid var(--line,#e4dfd3);vertical-align:top;line-height:1.6;}
  .article-prose tr:last-child td{border-bottom:none;}
  .article-prose tr:nth-child(even) td{background:var(--paper,#faf7f2);}
  .article-prose th:first-child{border-radius:8px 0 0 0;}
  .article-prose th:last-child{border-radius:0 8px 0 0;}

  /* ── Article divider above body ── */
  .article-divider{height:1px;background:var(--line,#e4dfd3);margin:0 0 0;}

  /* ── Share bar ── */
  .article-share{display:flex;align-items:center;gap:10px;padding:20px 0;border-top:1px solid var(--line,#e4dfd3);border-bottom:1px solid var(--line,#e4dfd3);margin-bottom:40px;}
  .article-share-label{font-size:13px;font-weight:600;color:var(--ink-3,#7d8598);margin-right:4px;}
  .share-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:7px 14px;border-radius:999px;border:1px solid var(--line,#e4dfd3);background:#fff;color:var(--ink-2,#4a5366);cursor:pointer;text-decoration:none;transition:all .15s;}
  .share-btn:hover{border-color:var(--navy,#0d2444);color:var(--navy,#0d2444);background:rgba(13,36,68,.04);}
  .share-btn.copied{background:var(--navy,#0d2444);color:#fff;border-color:var(--navy,#0d2444);}
  .bookmark-btn svg{fill:none;stroke:currentColor;}
  .bookmark-btn.bookmarked{background:#fff8ec;border-color:#d9b683;color:#a8762f;}
  .bookmark-btn.bookmarked svg{fill:#d9b683;stroke:#d9b683;}

  /* ── Back to category ── */
  .article-back{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--ink-3,#7d8598);text-decoration:none;padding:8px 0;margin-bottom:20px;transition:color .15s;}
  .article-back:hover{color:var(--navy,#0d2444);}

  /* ── Related articles ── */
  .article-related{background:var(--bg-2,#f5f1ea);padding:56px 0 64px;margin-top:40px;}
  .article-related-head{max-width:800px;margin:0 auto 28px;padding:0 24px;}
  .article-related-title{font-size:18px;font-weight:700;color:var(--navy-ink,#0a1a31);letter-spacing:-.3px;}
  .article-related-grid{max-width:800px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}

  /* ── Compact card for related ── */
  .card-compact{background:#fff;border-radius:10px;overflow:hidden;transition:transform .2s,box-shadow .2s;}
  .card-compact:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(13,36,68,.1);}
  .card-compact-media{aspect-ratio:16/9;background-size:cover;background-position:center;display:block;}
  .card-compact-body{padding:14px 16px 16px;}
  .card-compact-tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent,#378ADD);margin-bottom:6px;}
  .card-compact-title{font-size:14px;font-weight:600;color:var(--navy-ink,#0a1a31);line-height:1.45;margin:0 0 8px;}
  .card-compact-meta{font-size:12px;color:var(--ink-3,#7d8598);}

  /* ── Not found / loading ── */
  .article-state{text-align:center;padding:80px 24px;max-width:480px;margin:0 auto;}
  .article-state h2{font-size:22px;font-weight:700;color:var(--navy-ink);margin-bottom:12px;}
  .article-state p{color:var(--ink-3);margin-bottom:24px;}

  @media (max-width:640px){
    .article-hero-body{padding:40px 20px 36px;}
    .article-layout{padding:0 20px 60px;}
    .article-prose{font-size:16px;}
    .article-related-grid{grid-template-columns:1fr;}
  }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/assets/js/data.js?v=4"></script>
<script src="/assets/js/supabase-client.js?v=8"></script>
<script src="/assets/js/inline-editor.js?v=4"></script>
<script src="/assets/js/search.js?v=5"></script>
<script src="/assets/js/earthquake-alert.js" defer></script>

<script>
(function () {
  'use strict';
  var C    = window.IsshoCore;
  var slug = new URLSearchParams(window.location.search).get('slug') || '';
  C.init(null);

  /* ── Reading progress ── */
  var progBar = document.getElementById('readingProgress');
  document.addEventListener('scroll', function () {
    var el   = document.getElementById('articleLayout');
    if (!el || !progBar) return;
    var rect = el.getBoundingClientRect();
    var h    = el.offsetHeight - window.innerHeight;
    var pct  = h > 0 ? Math.min(100, Math.max(0, (-rect.top / h) * 100)) : 0;
    progBar.style.width = pct + '%';
  }, { passive: true });

  /* ── Markdown parser ── */
  function md(text) {
    if (!text) return '';
    var lines = text.split('\n');
    var out   = [];
    var inUl = false, inOl = false, inBq = false, inTable = false;
    var tableRows = [];

    function closeLists() { if (inUl) { out.push('</ul>'); inUl=false; } if (inOl) { out.push('</ol>'); inOl=false; } }
    function closeBq()    { if (inBq) { out.push('</blockquote>'); inBq=false; } }
    function closeTable() {
      if (!inTable) return;
      inTable = false;
      if (tableRows.length < 2) { tableRows.forEach(function(r){ out.push('<p>'+r+'</p>'); }); tableRows=[]; return; }
      var html = '<table>';
      var sepIdx = -1;
      for (var r=0; r<tableRows.length; r++) {
        if (/^\|[-| :]+\|$/.test(tableRows[r].replace(/\s/g,''))) { sepIdx = r; break; }
      }
      var headerRows = sepIdx > 0 ? tableRows.slice(0, sepIdx) : [];
      var bodyRows   = sepIdx >= 0 ? tableRows.slice(sepIdx + 1) : tableRows;
      function parseCells(row) {
        return row.replace(/^\||\|$/g,'').split('|').map(function(c){ return c.trim(); });
      }
      if (headerRows.length) {
        html += '<thead>';
        headerRows.forEach(function(row){ html += '<tr>'+parseCells(row).map(function(c){ return '<th>'+inline(c)+'</th>'; }).join('')+'</tr>'; });
        html += '</thead>';
      }
      if (bodyRows.length) {
        html += '<tbody>';
        bodyRows.forEach(function(row){ html += '<tr>'+parseCells(row).map(function(c){ return '<td>'+inline(c)+'</td>'; }).join('')+'</tr>'; });
        html += '</tbody>';
      }
      html += '</table>';
      out.push(html);
      tableRows = [];
    }
    function inline(s) {
      return s
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,         '<em>$1</em>')
        .replace(/`(.+?)`/g,           '<code>$1</code>')
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy" class="article-inline-img">')
        .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    }
    for (var i = 0; i < lines.length; i++) {
      var t = lines[i].trim();
      /* Standalone image line → block-level img */
      var imgM = /^!\[([^\]]*)\]\(([^)]+)\)$/.exec(t);
      if (imgM) { closeLists(); closeBq(); out.push('<img src="'+imgM[2]+'" alt="'+imgM[1]+'" loading="lazy" class="article-inline-img">'); continue; }
      /* Table row detection */
      if (/^\|.+/.test(t)) {
        closeLists(); closeBq();
        inTable = true;
        tableRows.push(t);
        continue;
      }
      if (inTable) { closeTable(); }
      if (/^#### (.+)/.test(t)) { closeLists(); closeBq(); out.push('<h4>'+inline(t.slice(5))+'</h4>'); continue; }
      if (/^### (.+)/.test(t))  { closeLists(); closeBq(); out.push('<h3>'+inline(t.slice(4))+'</h3>'); continue; }
      if (/^## (.+)/.test(t))   { closeLists(); closeBq(); out.push('<h2>'+inline(t.slice(3))+'</h2>'); continue; }
      if (/^# (.+)/.test(t))    { closeLists(); closeBq(); out.push('<h2>'+inline(t.slice(2))+'</h2>'); continue; }
      if (/^---+$/.test(t))     { closeLists(); closeBq(); out.push('<hr>'); continue; }
      if (/^> (.*)/.test(t))    { closeLists(); if (!inBq) { out.push('<blockquote>'); inBq=true; } out.push('<p>'+inline(t.slice(2))+'</p>'); continue; }
      if (/^[-*+] (.+)/.test(t)){ closeBq(); if (inOl){out.push('</ol>');inOl=false;} if(!inUl){out.push('<ul>');inUl=true;} out.push('<li>'+inline(t.slice(2))+'</li>'); continue; }
      var om = t.match(/^\d+\. (.+)/);
      if (om) { closeBq(); if(inUl){out.push('</ul>');inUl=false;} if(!inOl){out.push('<ol>');inOl=true;} out.push('<li>'+inline(om[1])+'</li>'); continue; }
      if (t === '') { closeLists(); closeBq(); out.push(''); continue; }
      closeLists(); closeBq(); out.push(inline(t));
    }
    closeLists(); closeBq(); closeTable();
    return out.join('\n').split(/\n{2,}/).map(function(b){
      b = b.trim();
      if (!b) return '';
      if (/^<\//.test(b)) return b;
      if (/^<(h[1-6]|ul|ol|li|hr|blockquote|p|table|img|div|section|figure|figcaption|iframe|video|audio|style|details|summary)/.test(b)) return b;
      return '<p>'+b.replace(/\n/g,'<br>')+'</p>';
    }).filter(Boolean).join('\n');
  }

  /* ── Compact card for related ── */
  function relatedCardHTML(a, lang) {
    var title  = lang === 'tc' ? (a.title_tc || a.title_en) : (a.title_en || a.title_tc);
    var img    = a.cover_image_url || 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=600&q=70';
    var cat    = a.category_key || '';
    var date   = a.published_at ? new Date(a.published_at).toLocaleDateString(lang==='tc'?'zh-Hant':'en',{month:'short',day:'numeric'}) : '';
    return '<a class="card-compact" href="/article/'+a.slug+'/" style="text-decoration:none;">'
      + '<div class="card-compact-media" style="background-image:url(\''+img+'\')"></div>'
      + '<div class="card-compact-body">'
      + '<div class="card-compact-tag">'+cat+'</div>'
      + '<div class="card-compact-title">'+title+'</div>'
      + '<div class="card-compact-meta">'+date+'</div>'
      + '</div></a>';
  }

  /* ── Nav labels ── */
  var D    = window.ISSHO_DATA;
  var NAV_LABELS = {};
  (D.nav||[]).forEach(function(n){ NAV_LABELS[n.key] = { tc: n.tc, en: n.en }; });

  function getCatLabel(catKey, lang) {
    var entry = NAV_LABELS[catKey];
    if (entry) return lang === 'tc' ? entry.tc : entry.en;
    return catKey;
  }

  /* ── Main article loader ── */
  function getLang() { return C.getLang(); }

  if (!slug) {
    document.getElementById('articleLayout').innerHTML =
      '<div class="article-state"><h2>找不到文章</h2><p><a href="/">返回首頁</a></p></div>';
  } else {
    loadArticle(slug);
  }

  async function loadArticle(s) {
    var heroEl   = document.getElementById('articleHero');
    var layoutEl = document.getElementById('articleLayout');
    var relSect  = document.getElementById('articleRelated');

    var res = await window.IsshoAPI.fetchArticle(s);
    var a   = res.data;

    if (res.error || !a) {
      layoutEl.innerHTML = '<div class="article-state"><h2>找不到文章</h2><p style="color:var(--ink-3);margin-bottom:20px">這篇文章可能已移除或網址有誤。</p><a href="/" class="btn-primary">返回首頁</a></div>';
      return;
    }

    var lang     = getLang();
    var title    = lang === 'tc' ? (a.title_tc || a.title_en)   : (a.title_en || a.title_tc);
    var rawBody  = lang === 'tc' ? (a.body_tc  || a.body_en ||'') : (a.body_en || a.body_tc || '');
    var body     = md(rawBody);
    var excerpt  = lang === 'tc' ? (a.excerpt_tc || '') : (a.excerpt_en || '');
    var catKey   = a.category_key || '';
    var catUrl   = catKey ? '/'+catKey+'/' : '/';
    var catLabel = getCatLabel(catKey, lang);
    var author   = a.author || '';
    var initials = author ? author.split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase() : '';
    var date     = a.published_at
      ? new Date(a.published_at).toLocaleDateString(lang==='tc'?'zh-Hant':'en',{year:'numeric',month:'long',day:'numeric'})
      : '';
    var homeLabel = lang === 'tc' ? '首頁' : 'Home';
    var shareLabel  = lang === 'tc' ? '分享：' : 'Share:';
    var copyLabel   = lang === 'tc' ? '複製連結' : 'Copy link';
    var relatedLabel = lang === 'tc' ? '同類更多文章' : 'More from this category';
    var backLabel   = lang === 'tc' ? '返回'+catLabel : 'Back to '+catLabel;

    /* Update meta */
    document.title = title + ' — IsshoHub';
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = excerpt || title;

    /* Dynamic OG / canonical for article pages */
    var articleUrl = 'https://isshohub.com/article/' + slug + '/';
    var ogImg = a.cover_image_url || 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=1200&q=80';
    function setMeta(sel, attr, val) {
      var el = document.querySelector(sel);
      if (!el) { el = document.createElement('meta'); document.head.appendChild(el); }
      el.setAttribute(attr, val);
    }
    function setLink(rel, href) {
      var sel = 'link[rel="' + rel + '"]';
      var el = document.querySelector(sel);
      if (!el) { el = document.createElement('link'); el.rel = rel; document.head.appendChild(el); }
      el.href = href;
    }
    setMeta('meta[property="og:type"]',        'property', 'og:type');        setMeta('meta[property="og:type"]',        'content', 'article');
    setMeta('meta[property="og:site_name"]',   'property', 'og:site_name');   setMeta('meta[property="og:site_name"]',   'content', 'IsshoHub');
    setMeta('meta[property="og:url"]',         'property', 'og:url');         setMeta('meta[property="og:url"]',         'content', articleUrl);
    setMeta('meta[property="og:title"]',       'property', 'og:title');       setMeta('meta[property="og:title"]',       'content', title + ' — IsshoHub');
    setMeta('meta[property="og:description"]', 'property', 'og:description'); setMeta('meta[property="og:description"]', 'content', excerpt || title);
    setMeta('meta[property="og:image"]',       'property', 'og:image');       setMeta('meta[property="og:image"]',       'content', ogImg);
    setMeta('meta[name="twitter:card"]',       'name',     'twitter:card');   setMeta('meta[name="twitter:card"]',       'content', 'summary_large_image');
    setMeta('meta[name="twitter:title"]',      'name',     'twitter:title');  setMeta('meta[name="twitter:title"]',      'content', title + ' — IsshoHub');
    setMeta('meta[name="twitter:description"]','name','twitter:description'); setMeta('meta[name="twitter:description"]', 'content', excerpt || title);
    setMeta('meta[name="twitter:image"]',      'name',     'twitter:image');  setMeta('meta[name="twitter:image"]',      'content', ogImg);
    setLink('canonical', articleUrl);

    /* ── Hero (title / meta on navy background, no bg image) ── */
    var heroMeta =
      '<div class="article-hero-meta">'
      + (initials ? '<div class="article-hero-avatar">'+initials+'</div>' : '')
      + (author ? '<span class="article-hero-author">'+author+'</span>' : '')
      + (author && date ? '<div class="article-hero-dot"></div>' : '')
      + (date ? '<span>'+date+'</span>' : '')
      + '</div>';

    heroEl.innerHTML =
      '<div class="article-hero">'
      + '<div class="article-hero-body">'
      + '<div class="article-hero-breadcrumb">'
      + '<a href="/">'+homeLabel+'</a><span class="sep">/</span>'
      + '<a href="'+catUrl+'">'+catLabel+'</a>'
      + '</div>'
      + '<div class="article-hero-tag">'+catLabel+'</div>'
      + '<h1 class="article-hero-title">'+title+'</h1>'
      + (excerpt ? '<p class="article-hero-excerpt">'+excerpt+'</p>' : '')
      + heroMeta
      + '</div>'
      + '</div>';

    /* ── Cover image shown clearly below hero ── */
    layoutEl.innerHTML = a.cover_image_url
      ? '<div class="article-cover-img" style="background-image:url(\''+a.cover_image_url+'\')"></div>'
      : '';

    /* Body */
    layoutEl.innerHTML +=
      '<div class="article-body-wrap">'
      + '<a class="article-back" href="'+catUrl+'">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>'
      + backLabel
      + '</a>'
      + '<div class="article-prose" id="articleProse">'
      + (body || '<p>'+excerpt+'</p>')
      + '</div>'
      + '<div class="article-share">'
      + '<span class="article-share-label">'+shareLabel+'</span>'
      + '<button class="share-btn bookmark-btn" id="articleBookmark" data-article-id="'+a.id+'">'
      + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>'
      + (lang === 'tc' ? '收藏' : 'Save')
      + '</button>'
      + '<button class="share-btn" id="shareCopy"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>'+copyLabel+'</button>'
      + '<a class="share-btn" href="https://twitter.com/intent/tweet?url='+encodeURIComponent(window.location.href)+'&text='+encodeURIComponent(title)+'" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.9 3h3.4l-7.4 8.4L23.5 21h-6.8l-5.3-6.9L5.3 21H1.9l7.9-9L1 3h7l4.8 6.4L18.9 3z"/></svg>X</a>'
      + '<a class="share-btn" href="https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(window.location.href)+'" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C5.37 2 0 6.36 0 11.74c0 4.82 4.24 8.86 9.97 9.63.39.08.92.26 1.05.6.12.3.08.79.04 1.08L11 24c-.05.32-.25 1.23 1.09.67 1.34-.57 7.22-4.26 9.85-7.28C23.73 15.4 24 13.6 24 11.74 24 6.36 18.63 2 12 2z"/></svg>LINE</a>'
      + '</div>'
      + '</div>';

    /* Copy link */
    var copyBtn = document.getElementById('shareCopy');
    if (copyBtn) {
      copyBtn.addEventListener('click', function() {
        navigator.clipboard.writeText(window.location.href).then(function(){
          copyBtn.classList.add('copied');
          copyBtn.textContent = lang === 'tc' ? '✓ 已複製' : '✓ Copied';
          setTimeout(function(){ copyBtn.classList.remove('copied'); copyBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>'+copyLabel; }, 2000);
        }).catch(function(){});
      });
    }

    /* Bookmark button */
    var bookmarkBtn = document.getElementById('articleBookmark');
    if (bookmarkBtn) {
      var savedLabel   = lang === 'tc' ? '已收藏' : 'Saved';
      var unsavedLabel = lang === 'tc' ? '收藏'   : 'Save';
      var bookmarkSVG  = '<svg width="13" height="13" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>';
      /* Check if already saved */
      window.IsshoAPI.getSavedArticles().then(function(res) {
        var saved = (res.data || []).some(function(x) { return x.article_id === a.id; });
        if (saved) {
          bookmarkBtn.classList.add('bookmarked');
          bookmarkBtn.innerHTML = bookmarkSVG.replace('fill="none" stroke="currentColor"','fill="currentColor" stroke="none"') + savedLabel;
        }
      }).catch(function(){});
      bookmarkBtn.addEventListener('click', function() {
        window.IsshoAuth.getUser().then(function(user) {
          if (!user) { document.querySelector('[data-open-login]') && document.querySelector('[data-open-login]').click(); return; }
          var isSaved = bookmarkBtn.classList.contains('bookmarked');
          if (isSaved) {
            window.IsshoAPI.unsaveArticle(a.id).then(function() {
              bookmarkBtn.classList.remove('bookmarked');
              bookmarkBtn.innerHTML = bookmarkSVG.replace('fill="none" stroke="currentColor"','fill="none" stroke="currentColor"') + unsavedLabel;
            });
          } else {
            window.IsshoAPI.saveArticle(a.id).then(function() {
              bookmarkBtn.classList.add('bookmarked');
              bookmarkBtn.innerHTML = bookmarkSVG.replace('fill="none" stroke="currentColor"','fill="currentColor" stroke="none"') + savedLabel;
            });
          }
        });
      });
    }

    /* Related articles: same sub-category first, then same category */
    if (catKey) {
      var subKey = a.sub_category_key || '';
      var relRes = await window.IsshoAPI.fetchArticles({ category: catKey, limit: 20 });
      var pool = (relRes.data||[]).filter(function(x){ return x.slug !== s; });
      /* Sort: matching sub_category_key first */
      if (subKey) {
        pool.sort(function(x, y) {
          var xMatch = x.sub_category_key === subKey ? 0 : 1;
          var yMatch = y.sub_category_key === subKey ? 0 : 1;
          return xMatch - yMatch;
        });
      }
      var others = pool.slice(0, 6);
      if (others.length) {
        relSect.style.display = '';
        document.getElementById('relatedTitle').textContent = relatedLabel;
        document.getElementById('relatedGrid').innerHTML = others.map(function(x){ return relatedCardHTML(x, lang); }).join('');
      }
    }

    /* Inline editor for admins */
    if (window.IsshoInlineEditor) window.IsshoInlineEditor.init(a);
  }

  C.onLangChange(function() { if (slug) loadArticle(slug); });

  /* ── FX calculator ── */
  (function(){
    var C2=['HKD','TWD','USD','EUR','GBP','CAD','AUD','SGD'];
    var tEl=document.getElementById('tickerRate'),fi=document.getElementById('fxInput'),fo=document.getElementById('fxOutput'),ff=document.getElementById('fxFrom'),fr=document.getElementById('fxRates'),fRoot=document.getElementById('fx'),rates2={},last2='input';
    var fxT=document.getElementById('fxTrigger'),fxCl=document.getElementById('fxClose');
    if(fxT) fxT.addEventListener('click',function(){fRoot.classList.toggle('open');});
    if(fxCl) fxCl.addEventListener('click',function(){fRoot.classList.remove('open');});
    document.addEventListener('click',function(e){if(fRoot&&!fRoot.contains(e.target))fRoot.classList.remove('open');});
    var fmt2=function(v){return v>=10?v.toFixed(2):v.toFixed(3);},fmtJ2=function(v){return String(Math.round(v));};
    function cFF2(){var a=parseFloat(fi.value),c=ff.value;if(!isNaN(a)&&rates2[c])fo.value=fmtJ2(a*rates2[c]);}
    function cFJ2(){var j=parseFloat(fo.value),c=ff.value;if(!isNaN(j)&&rates2[c])fi.value=fmt2(j/rates2[c]);}
    if(fi) fi.addEventListener('input',function(){last2='input';cFF2();});
    if(fo) fo.addEventListener('input',function(){last2='output';cFJ2();});
    if(ff) ff.addEventListener('change',function(){var l=document.getElementById('fxFromLabel');if(l)l.textContent=ff.value;last2==='output'?cFJ2():cFF2();});
    fetch('https://open.er-api.com/v6/latest/JPY').then(function(r){return r.json();}).then(function(j){
      if(j.result!=='success'||!j.rates)return;
      C2.filter(function(c){return j.rates[c];}).forEach(function(c){rates2[c]=1/j.rates[c];});
      if(tEl){var p=C2.filter(function(c){return rates2[c];}).map(function(c){return c+' <b>¥'+fmt2(rates2[c])+'</b>';});var i=0;var s=function(){tEl.innerHTML=p.slice(i,i+2).join('&nbsp;&nbsp;');i=(i+2)%p.length;};s();setInterval(s,3000);}
      if(fr)fr.innerHTML=C2.filter(function(c){return rates2[c];}).map(function(c){return '<div class="fx-rate-item"><div class="k">'+c+'/JPY</div><div class="v">'+fmt2(rates2[c])+'</div></div>';}).join('');
      if(fi&&fi.value)cFF2();
    }).catch(function(){});
  })();
  document.body.classList.add('js-ready');
})();
</script>
<script src="/assets/js/preview-guard.js"></script>
</body>
