<style>
  .article-page { max-width: 740px; margin: 0 auto; padding: 48px 24px 80px; }
  .article-kicker { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
  .article-title { font-size: clamp(28px, 5vw, 44px); font-weight: 800; line-height: 1.2; color: var(--navy-ink); margin-bottom: 16px; font-family: var(--sans-tc); }
  .article-meta-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 13px; color: var(--ink-3); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 14px 0; margin-bottom: 32px; }
  .article-meta-row .author { font-weight: 600; color: var(--navy-ink); }
  .article-cover { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: var(--r-lg); margin-bottom: 36px; background: var(--bg-2); }
  .article-body { font-size: 17px; line-height: 1.85; color: var(--ink-1); }
  .article-body h2 { font-size: 22px; font-weight: 700; color: var(--navy-ink); margin: 40px 0 14px; font-family: var(--sans-tc); }
  .article-body h3 { font-size: 18px; font-weight: 700; color: var(--navy-ink); margin: 32px 0 10px; }
  .article-body p { margin-bottom: 20px; }
  .article-body ul, .article-body ol { padding-left: 24px; margin-bottom: 20px; }
  .article-body li { margin-bottom: 8px; }
  .article-body blockquote { border-left: 3px solid var(--accent); padding-left: 20px; color: var(--ink-2); font-style: italic; margin: 28px 0; }
  .article-body a { color: var(--accent); text-decoration: underline; }
  .article-body img { max-width: 100%; border-radius: var(--r); margin: 24px 0; }
  .article-breadcrumb { font-size: 13px; color: var(--ink-3); margin-bottom: 24px; display: flex; align-items: center; gap: 6px; }
  .article-breadcrumb a { color: var(--ink-3); }
  .article-breadcrumb a:hover { color: var(--accent); }
  .article-loading { text-align: center; padding: 80px 0; color: var(--ink-3); font-size: 15px; }
  .article-notfound { text-align: center; padding: 80px 0; }
  .article-notfound h2 { font-size: 24px; font-weight: 700; color: var(--navy-ink); margin-bottom: 12px; }
  .article-tag { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; background: var(--bg-2); color: var(--ink-2); margin-right: 6px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
(function () {
  const C = window.IsshoCore;
  C.init(null);

  function getLang() { return C.getLang(); }

  /* ── Markdown → HTML parser ── */
  function md(text) {
    if (!text) return '';
    const lines = text.split('\n');
    const out = [];
    let inUl = false, inOl = false, inBlockquote = false;

    function closeLists() {
      if (inUl)  { out.push('</ul>');  inUl  = false; }
      if (inOl)  { out.push('</ol>');  inOl  = false; }
    }
    function closeBlockquote() {
      if (inBlockquote) { out.push('</blockquote>'); inBlockquote = false; }
    }

    function inline(s) {
      return s
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,         '<em>$1</em>')
        .replace(/`(.+?)`/g,           '<code>$1</code>')
        .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    }

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const trimmed = line.trim();

      /* Headings */
      if (/^#### (.+)/.test(trimmed)) { closeLists(); closeBlockquote(); out.push(`<h4>${inline(trimmed.slice(5))}</h4>`); continue; }
      if (/^### (.+)/.test(trimmed))  { closeLists(); closeBlockquote(); out.push(`<h3>${inline(trimmed.slice(4))}</h3>`); continue; }
      if (/^## (.+)/.test(trimmed))   { closeLists(); closeBlockquote(); out.push(`<h2>${inline(trimmed.slice(3))}</h2>`); continue; }
      if (/^# (.+)/.test(trimmed))    { closeLists(); closeBlockquote(); out.push(`<h2>${inline(trimmed.slice(2))}</h2>`); continue; }

      /* Horizontal rule */
      if (/^---+$/.test(trimmed)) { closeLists(); closeBlockquote(); out.push('<hr>'); continue; }

      /* Blockquote */
      if (/^> (.*)/.test(trimmed)) {
        closeLists();
        if (!inBlockquote) { out.push('<blockquote>'); inBlockquote = true; }
        out.push(`<p>${inline(trimmed.slice(2))}</p>`);
        continue;
      }

      /* Unordered list */
      if (/^[-*+] (.+)/.test(trimmed)) {
        closeBlockquote();
        if (inOl) { out.push('</ol>'); inOl = false; }
        if (!inUl) { out.push('<ul>'); inUl = true; }
        out.push(`<li>${inline(trimmed.slice(2))}</li>`);
        continue;
      }

      /* Ordered list */
      const olMatch = trimmed.match(/^\d+\. (.+)/);
      if (olMatch) {
        closeBlockquote();
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (!inOl) { out.push('<ol>'); inOl = true; }
        out.push(`<li>${inline(olMatch[1])}</li>`);
        continue;
      }

      /* Empty line — close open blocks */
      if (trimmed === '') {
        closeLists();
        closeBlockquote();
        out.push('');
        continue;
      }

      /* Normal paragraph line */
      closeLists();
      closeBlockquote();
      out.push(inline(trimmed));
    }

    closeLists();
    closeBlockquote();

    /* Join lines: consecutive non-empty lines → paragraph, empty lines = paragraph break */
    const rawHtml = out.join('\n');
    /* Wrap non-tag text blocks in <p> */
    return rawHtml
      .split(/\n{2,}/)
      .map(block => {
        block = block.trim();
        if (!block) return '';
        if (/^<(h[1-6]|ul|ol|li|hr|blockquote|p)/.test(block)) return block;
        return `<p>${block.replace(/\n/g, '<br>')}</p>`;
      })
      .filter(Boolean)
      .join('\n');
  }

  /* ── Get slug from URL param: /article/?slug=my-slug ── */
  const slug = new URLSearchParams(window.location.search).get('slug') || '';

  if (!slug) {
    document.getElementById('articleContent').innerHTML = `
      <div class="article-notfound">
        <h2>找不到文章</h2>
        <p><a href="/">返回首頁</a></p>
      </div>`;
  } else {
    loadArticle(slug);
  }

  async function loadArticle(slug) {
    const { data: a, error } = await window.IsshoAPI.fetchArticle(slug);
    const el = document.getElementById('articleContent');

    if (error || !a) {
      el.innerHTML = `
        <div class="article-notfound">
          <h2>找不到文章</h2>
          <p style="color:var(--ink-3);margin-bottom:24px">這篇文章可能已移除或網址有誤。</p>
          <a href="/" class="btn-primary">返回首頁</a>
        </div>`;
      return;
    }

    const lang = getLang();
    const title    = lang === 'tc' ? (a.title_tc   || a.title_en)   : (a.title_en   || a.title_tc);
    const rawBody  = lang === 'tc' ? (a.body_tc || a.body_en || '') : (a.body_en || a.body_tc || '');
    const body     = md(rawBody);
    const excerpt  = lang === 'tc' ? (a.excerpt_tc  || '')           : (a.excerpt_en  || '');
    const catLabel = a.category_key || '';
    const catUrl   = a.category_key ? `/${a.category_key}/` : '/';
    const author   = a.author || '';
    const date     = a.published_at
      ? new Date(a.published_at).toLocaleDateString(lang === 'tc' ? 'zh-Hant' : 'en', { year:'numeric', month:'long', day:'numeric' })
      : '';
    const readTime = lang === 'tc' ? `${a.read_time || 5} 分鐘閱讀` : `${a.read_time || 5} min read`;
    const homeLabel = lang === 'tc' ? '首頁' : 'Home';

    /* Update page title & meta */
    document.title = `${title} — IsshoHub`;
    const metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = excerpt;

    el.innerHTML = `
      <div class="article-breadcrumb">
        <a href="/">${homeLabel}</a>
        <span>/</span>
        <a href="${catUrl}">${catLabel}</a>
        <span>/</span>
        <span>${title}</span>
      </div>
      <div class="article-kicker">${catLabel.toUpperCase()}</div>
      <h1 class="article-title">${title}</h1>
      <div class="article-meta-row">
        <span class="author">${author}</span>
        ${author ? '<span>·</span>' : ''}
        <span>${date}</span>
        <span>·</span>
        <span>${readTime}</span>
      </div>
      ${a.cover_image_url ? `<div class="article-cover" style="background-image:url('${a.cover_image_url}');background-size:cover;background-position:center;"></div>` : ''}
      <div class="article-body">${body || `<p>${excerpt}</p>`}</div>
    `;

    /* Init inline editor for admins */
    if (window.IsshoInlineEditor) window.IsshoInlineEditor.init(a);
  }

  window.onLangChange = function () { if (slug) loadArticle(slug); };

  /* ── Live FX calculator ── */
  (function initFX() {
    const CURRENCIES = ['HKD','TWD','USD','EUR','GBP','CAD','AUD','SGD'];
    const tickerEl  = document.getElementById('tickerRate');
    const fxInput   = document.getElementById('fxInput');
    const fxOutput  = document.getElementById('fxOutput');
    const fxFrom    = document.getElementById('fxFrom');
    const fxRates   = document.getElementById('fxRates');
    const fxTrigger = document.getElementById('fxTrigger');
    const fxClose   = document.getElementById('fxClose');
    let rates = {};
    let lastEdited = 'input';
    const fxRoot = document.getElementById('fx');
    if (fxTrigger) fxTrigger.addEventListener('click', () => fxRoot.classList.toggle('open'));
    if (fxClose)   fxClose.addEventListener('click',   () => fxRoot.classList.remove('open'));
    document.addEventListener('click', e => { if (fxRoot && !fxRoot.contains(e.target)) fxRoot.classList.remove('open'); });
    const fmt = v => v >= 10 ? v.toFixed(2) : v.toFixed(3);
    const fmtJPY = v => String(Math.round(v));
    function calcFromForeign() {
      const amt = parseFloat(fxInput.value);
      const cur = fxFrom.value;
      if (!isNaN(amt) && rates[cur]) fxOutput.value = fmtJPY(amt * rates[cur]);
    }
    function calcFromJPY() {
      const jpy = parseFloat(fxOutput.value);
      const cur = fxFrom.value;
      if (!isNaN(jpy) && rates[cur]) fxInput.value = fmt(jpy / rates[cur]);
    }
    if (fxInput)  fxInput.addEventListener('input',  () => { lastEdited = 'input';  calcFromForeign(); });
    if (fxOutput) fxOutput.addEventListener('input', () => { lastEdited = 'output'; calcFromJPY(); });
    if (fxFrom)   fxFrom.addEventListener('change',  () => {
      document.getElementById('fxFromLabel').textContent = fxFrom.value;
      lastEdited === 'output' ? calcFromJPY() : calcFromForeign();
    });
    fetch('https://open.er-api.com/v6/latest/JPY')
      .then(r => r.json())
      .then(json => {
        if (json.result !== 'success' || !json.rates) return;
        CURRENCIES.filter(c => json.rates[c]).forEach(c => { rates[c] = 1 / json.rates[c]; });
        if (tickerEl) {
          const parts = CURRENCIES.filter(c => rates[c]).map(c => `${c} <b>¥${fmt(rates[c])}</b>`);
          let idx = 0;
          const show = () => { tickerEl.innerHTML = parts.slice(idx, idx+2).join('&nbsp;&nbsp;'); idx = (idx+2) % parts.length; };
          show(); setInterval(show, 3000);
        }
        if (fxRates) {
          fxRates.innerHTML = CURRENCIES.filter(c => rates[c]).map(c =>
            `<div class="fx-rate-item"><div class="k">${c}/JPY</div><div class="v">${fmt(rates[c])}</div></div>`
          ).join('');
        }
        if (fxInput && fxInput.value) calcFromForeign();
      })
      .catch(() => {});
  })();

  if (window.IsshoSearch) window.IsshoSearch.init();
})();
</script>
</body>
</html>
