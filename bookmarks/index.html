      ? new Date(a.published_at).toLocaleDateString(lang === 'tc' ? 'zh-Hant' : 'en', {year:'numeric',month:'short',day:'numeric'})
      : '';
    return '<div class="bm-card" data-article-id="' + item.article_id + '">'
      + '<a class="bm-card-media" href="/article/' + a.slug + '/"'
      + (img ? ' style="background-image:url(\'' + img + '\')"' : '') + '></a>'
      + '<div class="bm-card-body">'
      + '<div class="bm-card-tag">' + cat + '</div>'
      + '<a class="bm-card-title" href="/article/' + a.slug + '/">' + title + '</a>'
      + '<div class="bm-card-meta">' + date + '</div>'
      + '</div>'
      + '<button class="bm-card-remove" data-remove-id="' + item.article_id + '" title="移除收藏">'
      + '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>'
      + '</button>'
      + '</div>';
  }

  function renderBookmarks(items, lang) {
    var titleEl = document.getElementById('bmTitle');
    var subEl   = document.getElementById('bmSub');
    if (!items.length) {
      if (titleEl) titleEl.textContent = lang === 'tc' ? '我的收藏' : 'My Bookmarks';
      if (subEl)   subEl.textContent   = '';
      main.innerHTML = '<div class="bm-empty">'
        + '<div class="bm-empty-icon">🔖</div>'
        + '<div class="bm-empty-title">' + (lang === 'tc' ? '還沒有收藏' : 'No bookmarks yet') + '</div>'
        + '<p class="bm-empty-sub">' + (lang === 'tc' ? '在文章頁面點擊「收藏」即可儲存。' : 'Click "Save" on any article to bookmark it.') + '</p>'
        + '<a class="bm-empty-btn" href="/">' + (lang === 'tc' ? '瀏覽文章' : 'Browse articles') + '</a>'
        + '</div>';
      return;
    }
    if (titleEl) titleEl.textContent = lang === 'tc' ? '我的收藏' : 'My Bookmarks';
    if (subEl)   subEl.textContent   = lang === 'tc' ? items.length + ' 篇已儲存' : items.length + ' saved';
    main.innerHTML = '<div class="bm-grid">' + items.map(function(x){ return cardHTML(x, lang); }).join('') + '</div>';

    /* Remove buttons */
    main.querySelectorAll('[data-remove-id]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id   = btn.getAttribute('data-remove-id');
        var card = btn.closest('.bm-card');
        btn.disabled = true;
        window.IsshoAPI.unsaveArticle(id).then(function(res) {
          if (!res.error && card) {
            card.style.transition = 'opacity .25s, transform .25s';
            card.style.opacity = '0';
            card.style.transform = 'scale(.95)';
            setTimeout(function(){ card.remove(); }, 260);
            /* Update subtitle count */
            var remaining = main.querySelectorAll('.bm-card').length - 1;
            if (subEl) subEl.textContent = lang === 'tc' ? remaining + ' 篇已儲存' : remaining + ' saved';
          }
        });
      });
    });
  }

  async function loadBookmarks() {
    var lang = getLang();
    var user = await window.IsshoAuth.getUser();
    if (!user) {
      main.innerHTML = '<div class="bm-login">'
        + '<div class="bm-login-icon">🔒</div>'
        + '<div class="bm-login-title">' + (lang === 'tc' ? '請先登入' : 'Sign in to view bookmarks') + '</div>'
        + '<p class="bm-login-sub">' + (lang === 'tc' ? '登入後即可查看你的收藏文章。' : 'Sign in to access your saved articles.') + '</p>'
        + '<button class="bm-empty-btn" data-open-login>'
        + (lang === 'tc' ? '登入 / 註冊' : 'Sign in / Register') + '</button>'
        + '</div>';
      /* Wire login button */
      var loginBtn = main.querySelector('[data-open-login]');
      if (loginBtn) loginBtn.addEventListener('click', function() {
        var globalLogin = document.querySelector('.btn-login[data-open-login]');
        if (globalLogin) globalLogin.click();
      });
      return;
    }
    var res = await window.IsshoAPI.getSavedArticles();
    renderBookmarks(res.data || [], lang);
  }

  loadBookmarks();

  C.onLangChange(function() { loadBookmarks(); });
  document.body.classList.add('js-ready');
})();
</script>
<script src="/assets/js/preview-guard.js"></script>
</body>
</html>
