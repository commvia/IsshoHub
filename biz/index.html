<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/assets/js/data.js"></script>
<script src="/assets/js/supabase-client.js"></script>
<script src="/assets/js/core.js"></script>
<script>
(function () {
  const D = window.ISSHO_DATA;
  const C = window.IsshoCore;

  const SUBS = D.nav.find(n => n.key === 'biz').sub;
  let activeSub = 'all';
  let _articles = null;

  function getLang() { return C.getLang(); }

  /* ── Supabase article → card HTML ── */
  function sbCardHTML(a, opts) {
    opts = opts || {};
    const lang = getLang();
    const title = lang === 'tc' ? (a.title_tc || a.title_en) : (a.title_en || a.title_tc);
    const excerpt = lang === 'tc' ? (a.excerpt_tc || '') : (a.excerpt_en || '');
    const img = a.cover_image_url || 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=800&q=80';
    const cat = a.category_key || '';
    const author = a.author || '';
    const date = a.published_at ? new Date(a.published_at).toLocaleDateString(lang === 'tc' ? 'zh-Hant' : 'en', { year:'numeric', month:'short', day:'numeric' }) : '';
    const readTime = lang === 'tc' ? `${a.read_time || 5} 分鐘閱讀` : `${a.read_time || 5} min read`;
    return `
      <article class="card ${opts.featured ? 'featured' : ''}">
        <a class="card-media" href="/article/${a.slug}" style="background-image: url('${img}')">
          <span class="card-tag cat-${cat}">${cat}</span>
        </a>
        <div class="card-body">
          <h3 class="card-title">${title}</h3>
          <p class="card-excerpt">${excerpt}</p>
          <div class="card-meta">
            <span class="author">${author}</span>
            <span class="dot"></span>
            <span>${date}</span>
            <span class="reading">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              ${readTime}
            </span>
          </div>
        </div>
      </article>`;
  }

  async function loadArticles() {
    if (_articles) return _articles;
    const { data } = await window.IsshoAPI.fetchArticles({ category: 'biz', limit: 20 });
    _articles = data || [];
    return _articles;
  }

  /* Startup checklist data */
  const BIZ_CHECKLIST = [
    { n: '01',
      tc: { t: '確定法人形態', d: '株式會社（KK）或合同會社（GK）各有優缺點，根據規模與稅務考量選擇。' },
      en: { t: 'Choose your entity type', d: 'KK (Kabushiki Kaisha) vs GK (Godo Kaisha) — different tax implications and prestige. Choose based on your scale.' },
      status_tc: '第一步', status_en: 'Step 1', done: true },
    { n: '02',
      tc: { t: '準備資本金（最低 1 円，建議 500 萬）', d: '技術簽證申請經營管理需要 500 萬日圓資本金，建議在設立前確認簽證要求。' },
      en: { t: 'Prepare capital (min ¥1, recommended ¥5M)', d: 'The Business Manager Visa requires ¥5M capital. Confirm visa requirements before incorporation.' },
      status_tc: '設立前', status_en: 'Pre-setup', done: true },
    { n: '03',
      tc: { t: '辦理法人登記（法務局）', d: '準備定款、申請書、印鑑等文件，委託司法書士可加快流程。' },
      en: { t: 'Register at the Legal Affairs Bureau', d: 'Prepare articles of incorporation, application forms, and company seals. A judicial scrivener can speed this up.' },
      status_tc: '2週', status_en: '~2 weeks' },
    { n: '04',
      tc: { t: '開設法人銀行戶口', d: '法人登記完成後立即申請，部分銀行需等待 1-3 個月。盡早開始。' },
      en: { t: 'Open a corporate bank account', d: 'Apply immediately after registration. Some banks take 1–3 months. Start early.' },
      status_tc: '盡早', status_en: 'ASAP' },
    { n: '05',
      tc: { t: '向稅務署申報設立', d: '法人設立後 2 個月內向稅務署提交開業屆，建議委託稅理士處理。' },
      en: { t: 'File incorporation notice with tax office', d: 'Within 2 months of establishment — a tax accountant (zeirishi) is strongly recommended.' },
      status_tc: '2月內', status_en: 'Within 2mo' },
  ];

  function renderCatHero() {
    const lang = getLang();
    const title = lang === 'tc' ? '創業・工作' : 'Business & Work';
    const enSub = lang === 'tc' ? 'Business & Work' : '創業・工作';
    const desc = lang === 'tc'
      ? '在日本創業、設立法人的完整指南。從選擇法人形態、開設銀行戶口，到申請補助金、僱用外國員工——每個環節都有雙語深度解說。'
      : 'Complete guides to starting a business and incorporating in Japan. From choosing your entity type and opening a bank account to grants, hiring, and tax basics.';
    const breadcrumb = lang === 'tc' ? '創業・工作' : 'Business & Work';
    const statLabel = lang === 'tc' ? '篇文章' : 'articles';
    const statSubs = lang === 'tc' ? '個子分類' : 'sub-categories';

    document.getElementById('catHeroTitle').textContent = title;
    document.getElementById('catHeroEn').textContent = enSub;
    document.getElementById('catHeroDesc').textContent = desc;
    document.getElementById('heroBreadcrumbCurrent').textContent = breadcrumb;
    document.getElementById('catStatLabel').textContent = statLabel;
    document.getElementById('catStatSubs').textContent = statSubs;
    document.getElementById('catHeroWatermark').textContent = lang === 'tc' ? '起業' : 'BIZ';

    /* startup checklist banner */
    const title2 = lang === 'tc' ? '在日本設立法人：五個關鍵步驟' : 'Incorporating in Japan: five critical steps';
    const desc2 = lang === 'tc' ? '從選擇法人形態到第一份稅務申報，我們把最容易踩坑的環節整理清楚。' : 'From entity type to your first tax filing — we mapped out the steps where most founders get tripped up.';
    const cta = lang === 'tc' ? '取得創業簽證支援 →' : 'Get startup visa support →';
    document.getElementById('checklistTitle').textContent = title2;
    document.getElementById('checklistDesc').textContent = desc2;
    const ctaEl = document.getElementById('checklistCta');
    ctaEl.textContent = cta;
    ctaEl.style.color = 'var(--accent-2)';

    document.getElementById('articlesTitle').textContent = lang === 'tc' ? '最新創業文章' : 'Latest business articles';
  }

  function renderSubcatNav() {
    const lang = getLang();
    const tabs = [{ key: 'all', tc: '全部', en: 'All', count: 62 }];
    const counts = [12, 9, 11, 8, 10, 7, 6, 9];
    SUBS.forEach((s, i) => tabs.push({ key: i, tc: s.tc, en: s.en, count: counts[i] || 8 }));

    document.getElementById('subcatScroll').innerHTML = tabs.map(tab => {
      const label = lang === 'tc' ? tab.tc : tab.en;
      const isActive = tab.key === activeSub;
      return `<a href="javascript:void(0)" class="subcat-tab${isActive ? ' active' : ''}" data-sub="${tab.key}">
        ${label}<span class="count">${tab.count}</span>
      </a>`;
    }).join('');

    document.getElementById('subcatScroll').addEventListener('click', e => {
      const tab = e.target.closest('.subcat-tab');
      if (!tab) return;
      activeSub = tab.getAttribute('data-sub');
      document.querySelectorAll('.subcat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  }

  function renderChecklist() {
    const lang = getLang();
    document.getElementById('bizChecklistItems').innerHTML = BIZ_CHECKLIST.map(c => {
      const title = lang === 'tc' ? c.tc.t : c.en.t;
      const desc = lang === 'tc' ? c.tc.d : c.en.d;
      const status = lang === 'tc' ? c.status_tc : c.status_en;
      return `
        <div class="checklist-item">
          <div class="check-num">${c.n}</div>
          <div class="check-body">
            <div class="check-title">${title}</div>
            <div class="check-desc">${desc}</div>
          </div>
          <div class="check-status ${c.done ? 'done' : ''}">${c.done ? '✓ ' : ''}${status}</div>
        </div>`;
    }).join('');
  }

  function renderFeatured() {
    loadArticles().then(articles => {
      const featured = articles.find(a => a.featured) || articles[0];
      if (featured) {
        document.getElementById('bizFeaturedGrid').innerHTML = sbCardHTML(featured, { featured: true });
      } else {
        document.getElementById('bizFeaturedGrid').innerHTML = C.cardHTML(D.biz_featured, { featured: true });
      }
    });
  }

  function renderArticles() {
    const lang = getLang();
    document.getElementById('articlesTitle').textContent = lang === 'tc' ? '最新創業文章' : 'Latest business articles';
    loadArticles().then(articles => {
      const rest = articles.filter(a => !a.featured);
      if (rest.length) {
        document.getElementById('bizArticlesGrid').innerHTML = rest.map(a => sbCardHTML(a)).join('');
        const numEl = document.querySelector('.cat-stat-num');
        if (numEl) numEl.textContent = articles.length;
      } else {
        document.getElementById('bizArticlesGrid').innerHTML = D.biz_articles.map(a => C.cardHTML(a)).join('');
      }
    });
  }

  function renderAll() {
    renderCatHero();
    renderSubcatNav();
    renderChecklist();
    renderFeatured();
    renderArticles();
  }

  window.onLangChange = function () { _articles = null; renderAll(); };

  C.init('biz');
  renderAll();

  /* ── Live FX calculator ── */
  (function initFX() {
    const CURRENCIES = ['HKD','TWD','USD','EUR','GBP','CAD','AUD','SGD'];
    const tickerEl  = document.getElementById('tickerRate');
    const fxInput   = document.getElementById('fxInput');
    const fxOutput  = document.getElementById('fxOutput');
    const fxFrom    = document.getElementById('fxFrom');
    const fxRates   = document.getElementById('fxRates');
    const fxTrigger = document.getElementById('fxTrigger');
    const fxClose   = document.getElementById('fxClose');
    let rates = {};
    let lastEdited = 'input';
    const fxRoot = document.getElementById('fx');
    if (fxTrigger) fxTrigger.addEventListener('click', () => fxRoot.classList.toggle('open'));
    if (fxClose)   fxClose.addEventListener('click',   () => fxRoot.classList.remove('open'));
    document.addEventListener('click', e => { if (fxRoot && !fxRoot.contains(e.target)) fxRoot.classList.remove('open'); });
    const fmt = v => v >= 10 ? v.toFixed(2) : v.toFixed(3);
    const fmtJPY = v => String(Math.round(v));
    function calcFromForeign() {
      const amt = parseFloat(fxInput.value);
      const cur = fxFrom.value;
      if (!isNaN(amt) && rates[cur]) fxOutput.value = fmtJPY(amt * rates[cur]);
    }
    function calcFromJPY() {
      const jpy = parseFloat(fxOutput.value);
      const cur = fxFrom.value;
      if (!isNaN(jpy) && rates[cur]) fxInput.value = fmt(jpy / rates[cur]);
    }
    if (fxInput)  fxInput.addEventListener('input',  () => { lastEdited = 'input';  calcFromForeign(); });
    if (fxOutput) fxOutput.addEventListener('input', () => { lastEdited = 'output'; calcFromJPY(); });
    if (fxFrom)   fxFrom.addEventListener('change',  () => {
      document.getElementById('fxFromLabel').textContent = fxFrom.value;
      lastEdited === 'output' ? calcFromJPY() : calcFromForeign();
    });
    fetch('https://open.er-api.com/v6/latest/JPY')
      .then(r => r.json())
      .then(json => {
        if (json.result !== 'success' || !json.rates) return;
        CURRENCIES.filter(c => json.rates[c]).forEach(c => { rates[c] = 1 / json.rates[c]; });
        if (tickerEl) {
          const parts = CURRENCIES.filter(c => rates[c]).map(c => `${c} <b>¥${fmt(rates[c])}</b>`);
          let idx = 0;
          const show = () => { tickerEl.innerHTML = parts.slice(idx, idx+2).join('&nbsp;&nbsp;'); idx = (idx+2) % parts.length; };
          show(); setInterval(show, 3000);
        }
        if (fxRates) {
          fxRates.innerHTML = CURRENCIES.filter(c => rates[c]).map(c =>
            `<div class="fx-rate-item"><div class="k">${c}/JPY</div><div class="v">${fmt(rates[c])}</div></div>`
          ).join('');
        }
        if (fxInput && fxInput.value) calcFromForeign();
      })
      .catch(() => {});
  })();
})();
</script>
