    <span data-i18n="fx_trigger"></span>
    <span class="badge">¥</span>
  </button>
  <div class="fx-panel" style="position:relative;">
    <button class="fx-close" id="fxClose">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <div class="fx-head">
      <h4 data-i18n="fx_title"></h4>
      <span class="live"><i></i><span data-i18n="fx_live"></span></span>

</div>

<script src="/assets/js/site-settings.js?v=7"></script>

<script>
(function () {
  const D = window.ISSHO_DATA;
  const C = window.IsshoCore;

  function getLang() { return C.getLang(); }
  function t(obj) { return C.t(obj); }

  function renderHero(sbHero) {
    const h = D.hero;
    const lang = getLang();

    const a = _sbHeroArticle; /* shorthand */

    /* Image: site_settings override first, then article cover, then static */
    const img = (sbHero && sbHero.hero_img) || (a && a.cover_image_url) || h.img;

    /* Kicker: site_settings override first, then article category name, then static */
    const catNav  = a && (D.nav || []).find(n => n.key === a.category_key);

    /* Tag: use article's actual category, else static fallback */
    const tag = catNav
      ? (lang === 'tc' ? (catNav.short_tc || catNav.tc) : (catNav.short_en || catNav.en))
      : (lang === 'tc' ? h.tag.tc : h.tag.en);
    const kicker  = (sbHero && (lang === 'tc' ? sbHero.hero_kicker_tc : sbHero.hero_kicker_en))
      || (catNav ? (lang === 'tc' ? catNav.tc : catNav.en) : '')
      || (lang === 'tc' ? h.kicker.tc : h.kicker.en);

    /* Title / subtitle: article data first, then site_settings, then static */
    const title = (a && (lang === 'tc' ? a.title_tc : a.title_en))
      || (sbHero && (lang === 'tc' ? sbHero.hero_title_tc : sbHero.hero_title_en))
      || (lang === 'tc' ? h.title.tc : h.title.en);
    const sub   = (a && (lang === 'tc' ? a.excerpt_tc : a.excerpt_en))
      || (sbHero && (lang === 'tc' ? sbHero.hero_sub_tc : sbHero.hero_sub_en))
      || (lang === 'tc' ? h.sub.tc : h.sub.en);

    /* Author / date: article data takes full priority when a slug is linked */
    const author = a ? (a.author || '') : t(h.author);
    const meta   = a ? '' : t(h.meta);
    const date   = a && a.published_at
      ? new Date(a.published_at).toLocaleDateString(lang === 'tc' ? 'zh-Hant' : 'en', { year: 'numeric', month: 'long', day: 'numeric' })
      : t(h.date);
    const avatar = author ? author.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase() : (a ? '' : h.avatar);

    const heroUrl = _sbHeroArticle ? `/article/${_sbHeroArticle.slug}/` : null;

    const heroMainEl = document.getElementById('heroMain');
    heroMainEl.style.cursor = heroUrl ? 'pointer' : '';
    heroMainEl.onclick = heroUrl ? () => { window.location.href = heroUrl; } : null;

    heroMainEl.innerHTML = `
      <div class="hero-img" style="background-image: url('${img}')"></div>
      <div class="hero-body">
        <div class="hero-top">
          <div class="hero-chip"><i></i>${tag}</div>
        </div>
        <div>
          <div class="hero-kicker">${kicker}</div>
          <h1 class="hero-title">${heroUrl ? `<a href="${heroUrl}" style="color:inherit;text-decoration:none;">${title}</a>` : title}</h1>
          <p class="hero-sub">${sub}</p>
          <div class="hero-meta">
            ${author ? `<div class="avatar">${avatar}</div><div>${lang === 'tc' ? '文／' : 'By '}<b style="color:#fff;font-weight:500">${author}</b></div><div class="dot"></div>` : ''}
            <div>${meta}</div>
            <div class="dot"></div>
            <div>${date}</div>
          </div>
        </div>
      </div>`;

    /* Hero side: use admin-configured articles, else static data.js */
    const sideEl = document.getElementById('heroSide');
    if (_sbSideArticles && _sbSideArticles.length) {
      const sideArticles = _sbSideArticles;
      if (sideArticles.length) {
        sideEl.innerHTML = sideArticles.map((a, i) => {
          const catNav = (D.nav || []).find(n => n.key === a.category_key);
          const catLabel = catNav ? (lang === 'tc' ? (catNav.short_tc || catNav.tc) : (catNav.short_en || catNav.en)) : (a.category_key || '');
          const sideTitle = lang === 'tc' ? (a.title_tc || a.title_en) : (a.title_en || a.title_tc);
          const sideImg = a.cover_image_url || 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=600&q=70';
          const pubDate = a.published_at ? new Date(a.published_at).toLocaleDateString(lang === 'tc' ? 'zh-Hant' : 'en', { month: 'short', day: 'numeric' }) : '';
          const sideMeta = pubDate;
          const sideVid = a.video_duration || '';
          const sideVideoOverlay = sideVid ? `
            <div class="thumb-video-play"><svg width="11" height="11" viewBox="0 0 24 24" fill="var(--navy)"><polygon points="5,3 19,12 5,21"/></svg></div>
            <div class="thumb-video-duration">${sideVid}</div>` : '';
          return `<a class="side-card" href="/article/${a.slug}/">
            <div class="side-thumb${sideVid ? ' thumb-has-video' : ''}" style="background-image: url('${sideImg}')">
              <div class="side-thumb-num">${String(i + 1).padStart(2, '0')}</div>
              ${sideVideoOverlay}
            </div>
            <div class="side-body">
              ${sideVid ? '<div class="video-label">VIDEO</div>' : ''}
              <div class="side-tag">${catLabel}</div>
              <div class="side-title">${sideTitle}</div>
              <div class="side-meta">${pubDate}</div>
            </div>
          </a>`;
        }).join('');
        return;
      }
    }
    /* Fall back to static */
    sideEl.innerHTML = D.hero_side.map(a => `
      <a class="side-card" href="${a.url || '#'}">
        <div class="side-thumb" style="background-image: url('${a.img}')">
          <div class="side-thumb-num">${a.num}</div>
        </div>
        <div class="side-body">
          <div class="side-tag">${lang === 'tc' ? a.tc_tag : a.en_tag}</div>
          <div class="side-title">${lang === 'tc' ? a.tc : a.en}</div>
        </div>
      </a>`).join('');
  }

  function renderHot() {
    const lang = getLang();
    window.IsshoAPI.fetchHotSearches().then(({ data }) => {
      if (data && data.length) {
        document.getElementById('hotPills').innerHTML = data.map((p, i) =>
          `<button class="pill"><span class="rank">${String(p.sort_order || i + 1).padStart(2,'0')}</span>${lang === 'tc' ? (p.keyword_tc || p.keyword_en) : (p.keyword_en || p.keyword_tc)}</button>`
        ).join('');
      } else {
        document.getElementById('hotPills').innerHTML = D.hot.map(p =>
          `<button class="pill ${p.fire ? 'fire' : ''}"><span class="rank">${String(p.rank).padStart(2,'0')}</span>${lang === 'tc' ? p.tc : p.en}</button>`
        ).join('');
      }
    });
  }

  function renderCats() {
    const lang = getLang();
    const navByKey = Object.fromEntries(D.nav.map(n => [n.key, n]));
    const eyebrow = document.getElementById('catsEyebrow');
    if (eyebrow) eyebrow.textContent = `— ${String(D.cats.length).padStart(2,'0')} Categories`;
    document.getElementById('catsGrid').innerHTML = D.cats.map(c => {
      const nav = navByKey[c.key];
      const hasSub = nav && nav.sub && nav.sub.length;
      const subHTML = hasSub ? `
        <div class="cat-popover">
          <div class="cat-pop-head">
            <div class="cat-pop-title">${lang === 'tc' ? c.tc : c.en}</div>
            <a href="${c.url}" class="cat-pop-all">${lang === 'tc' ? '查看全部' : 'View all'} →</a>
          </div>
          <div class="cat-pop-list">
            ${nav.sub.map(s => `<a href="${s.url || c.url}">${lang === 'tc' ? s.tc : s.en}</a>`).join('')}
          </div>
        </div>` : '';
      return `<div class="cat${hasSub ? ' has-sub' : ''}">
        <a class="cat-link" href="${c.url}">
          <span class="cat-count">${c.count}</span>
          <div class="cat-icon">${C.ICONS[c.icon] || ''}</div>
          <div class="cat-labels">
            <div class="cat-label-tc">${lang === 'tc' ? c.tc : c.en}</div>
            <div class="cat-label-en">${lang === 'tc' ? c.en : c.tc}</div>
          </div>
        </a>
        ${subHTML}
      </div>`;
    }).join('');
  }

  /* ── Supabase article → card HTML ── */
  function sbCardHTML(a, opts) {
    opts = opts || {};
    const lang = getLang();
    const hasTC = !!(a.title_tc);
    const title = lang === 'tc' ? (a.title_tc || a.title_en) : (a.title_en || a.title_tc);
    const excerpt = lang === 'tc' ? (a.excerpt_tc || a.excerpt_en || '') : (a.excerpt_en || a.excerpt_tc || '');
    const langBadge = (lang === 'tc' && !hasTC) ? '<span style="display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 6px;border-radius:4px;background:#e8f0fb;color:#1a56a8;margin-bottom:6px;">EN ONLY</span><br>' : '';
    const img = a.cover_image_url || 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=800&q=80';
    const cat = a.category_key || '';
    const author = a.author || '';
    const date = a.published_at ? new Date(a.published_at).toLocaleDateString(lang === 'tc' ? 'zh-Hant' : 'en', { month:'short', day:'numeric' }) : '';
    const url = `/article/${a.slug}/`;
    const vid = a.video_duration || '';
    const videoOverlay = vid ? `
      <div class="thumb-video-play"><svg width="12" height="12" viewBox="0 0 24 24" fill="var(--navy)"><polygon points="5,3 19,12 5,21"/></svg></div>
      <div class="thumb-video-duration">${vid}</div>` : '';
    const videoLabel = vid ? `<div class="video-label">VIDEO</div>` : '';
    return `
      <article class="card ${opts.featured ? 'featured' : ''}${opts.overlay ? ' overlay' : ''}" onclick="if(!event.target.closest('a'))window.location.href='${url}'" style="cursor:pointer">
        <a class="card-media${vid ? ' thumb-has-video' : ''}" href="${url}" style="background-image: url('${img}')">
          ${videoOverlay}
        </a>
        <a class="card-edit-chip" href="/article/${a.slug}/?edit=1" title="編輯文章">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </a>
        <div class="card-body">
          ${videoLabel}${langBadge}<h3 class="card-title">${title}</h3>
          <p class="card-excerpt">${excerpt}</p>
          <div class="card-meta">
            <span class="author">${author}</span>
            ${author && date ? '<span class="dot"></span>' : ''}
            <span>${date}</span>
          </div>
        </div>
      </article>`;
  }

  let _sbArticles = null;      /* cache: latest articles */
  let _sbPicksArticles = null; /* cache: editor picks articles */
  let _sbHero = null;          /* hero settings from Supabase */
  let _sbPicksSlugs = null;    /* homepage editor picks slugs from site_settings (null = not yet loaded) */
  let _sbFeaturedOrder = [];   /* featured_order slugs from site_settings */
  let _sbHeroArticle = null;   /* hero article (from site_settings hero_article_slug) */
  let _sbSideArticles = null;  /* side articles (from site_settings homepage_side_slugs) */
  let _catArticles = null;     /* cache: articles for category sections */

  async function loadSupabaseArticles() {
    if (_sbArticles) return _sbArticles;
    const { data } = await window.IsshoAPI.fetchArticles({ limit: 20 });
    _sbArticles = data || [];
    return _sbArticles;
  }

  async function loadPicksArticles() {
    if (_sbPicksArticles) return _sbPicksArticles;
    if (!_sbPicksSlugs || !_sbPicksSlugs.length) return null;
    const { data } = await window.IsshoAPI.fetchArticlesBySlug(_sbPicksSlugs);
    _sbPicksArticles = (data && data.length) ? data : null;
    return _sbPicksArticles;
  }

  /* Auto picks: only show articles explicitly marked featured=true, sorted by _sbFeaturedOrder */
  function _renderEditorAuto(editorGrid) {
    loadSupabaseArticles().then(articles => {
      let featuredArticles = articles.filter(a => a.featured);
      if (_sbFeaturedOrder.length) {
        featuredArticles = featuredArticles.slice().sort(function (a, b) {
          const ia = _sbFeaturedOrder.indexOf(a.slug);
          const ib = _sbFeaturedOrder.indexOf(b.slug);
          return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
        });
      }
      if (featuredArticles.length) {
        editorGrid.innerHTML = featuredArticles.map(a => sbCardHTML(a, { overlay: true })).join('');
      } else if (articles.length) {
        editorGrid.innerHTML = sbCardHTML(articles[0], { overlay: true });
      } else {
        editorGrid.innerHTML = C.cardHTML(D.featured, { featured: true });
      }
    });
  }

  function renderEditor() {
    const editorGrid = document.getElementById('editorGrid');
    if (_sbPicksSlugs && _sbPicksSlugs.length) {
      loadPicksArticles().then(articles => {
        if (articles && articles.length) {
          editorGrid.innerHTML = articles.slice(0, 6).map(a => sbCardHTML(a, { overlay: true })).join('');
        } else {
          _renderEditorAuto(editorGrid);
        }
      });
    } else {
      _renderEditorAuto(editorGrid);
    }
  }

  function renderNews() {
    const newsGrid = document.getElementById('newsGrid');
    if (!newsGrid) return;
    window.IsshoAPI.fetchArticles({ category: 'news', limit: 3 }).then(({ data }) => {
      if (data && data.length) {
        newsGrid.innerHTML = data.map(a => sbCardHTML(a)).join('');
      } else {
        newsGrid.closest('section').style.display = 'none';
      }
    });
  }

  function renderLatest() {
    const latestGrid = document.getElementById('latestGrid');
    loadSupabaseArticles().then(articles => {
      if (articles.length > 1) {
        latestGrid.innerHTML = articles.slice(1, 4).map(a => sbCardHTML(a)).join('');
      } else if (articles.length === 1) {
        latestGrid.innerHTML = sbCardHTML(articles[0]);
      } else {
        latestGrid.innerHTML = D.latest.slice(1, 4).map(a => C.cardHTML(a)).join('');
      }
    });
  }


  function storyCardHTML(s, lang) {
    /* s can be either a static D.stories item or a Supabase article object */
    const isArticle = !!s.slug;
    const catMap = { life: '生活', visa: '簽證', biz: '工作', culture: '文化', places: '旅遊', pets: '寵物', house: '住居', tax: '稅務' };
    const catMapEn = { life: 'Life', visa: 'Visa', biz: 'Work', culture: 'Culture', places: 'Travel', pets: 'Pets', house: 'Housing', tax: 'Tax' };
    const quote = isArticle
      ? ((lang === 'tc' ? s.story_quote : (s.story_quote_en || s.story_quote)) || (lang === 'tc' ? s.title_tc : s.title_en) || '')
      : (lang === 'tc' ? s.tc : s.en);
    const name  = isArticle ? (s.author || '') : (lang === 'tc' ? s.name_tc : s.name_en);
    const role  = isArticle
      ? (lang === 'tc' ? (catMap[s.category_key] || s.category_key) : (catMapEn[s.category_key] || s.category_key))
      : (lang === 'tc' ? s.role_tc : s.role_en);
    const img   = isArticle ? (s.cover_image_url || '') : s.img;
    const avatar = isArticle ? (name ? name.charAt(0).toUpperCase() : '?') : s.avatar;
    const href  = isArticle ? `/article/${s.slug}/` : null;
    return `
      <div class="story"${href ? ` onclick="window.location.href='${href}'" style="cursor:pointer"` : ''}>
        <div class="bg" style="background-image: url('${img}')"></div>
        <div class="story-inner">
          <div class="story-quote">「${quote}」</div>
          <div class="story-person">
            <div class="avatar">${avatar}</div>
            <div>
              <div class="story-name">${name}</div>
              <div class="story-role">${role}</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  let _sbStoryArticles = null; /* cached story articles from Supabase */

  function renderStories() {
    const lang = getLang();
    const grid = document.getElementById('storiesGrid');
    if (!grid) return;
    /* If Supabase stories loaded, use them; otherwise fall back to static data.js */
    if (_sbStoryArticles && _sbStoryArticles.length) {
      grid.innerHTML = _sbStoryArticles.map(s => storyCardHTML(s, lang)).join('');
    } else {
      grid.innerHTML = D.stories.map(s => storyCardHTML(s, lang)).join('');
    }
  }

  async function loadCatArticles() {
    if (_catArticles) return _catArticles;
    const { data } = await window.IsshoAPI.fetchArticles({ limit: 100 });
    _catArticles = data || [];
    return _catArticles;
  }

  function renderCatSections() {
    const lang = getLang();
    const nav = (D.nav || []);
    const container = document.getElementById('catArticleSections');
    if (!container) return;

    loadCatArticles().then(function(articles) {
      /* Group by category_key */
      const bycat = {};
      articles.forEach(function(a) {
        const k = a.category_key;
        if (!bycat[k]) bycat[k] = [];
        bycat[k].push(a);
      });

      const viewAll = lang === 'tc' ? '查看全部' : 'View all';

      const html = nav.filter(function(cat) { return cat.key !== 'news'; }).map(function(cat) {
        const arts = (bycat[cat.key] || []).slice(0, 3);
        if (!arts.length) return '';
        const title = lang === 'tc' ? cat.tc : cat.en;
        const cards = arts.map(function(a) { return sbCardHTML(a); }).join('');
        return `
          <section class="section">
            <div class="container">
              <div class="section-head">
                <div>
                  <div class="section-eyebrow">— ${title}</div>
                  <h2 class="section-title">${title}</h2>
                </div>
                <div class="section-actions">
                  <a class="link-more" href="${cat.url}">${viewAll} →</a>
                </div>
              </div>
              <div class="article-grid">${cards}</div>
            </div>
          </section>`;
      }).join('');

      container.innerHTML = html;
    });
  }

  /* ── Load site settings (stale-while-revalidate) ─────────────────────────
     1. Apply cached settings instantly (from sessionStorage) → no flash on refresh
     2. Always fetch fresh from Supabase → save to cache → silently re-apply
     sessionStorage scope: same tab session. Cleared when tab closes. */
  const _SC_KEY = '_iss_sc';

  function applySettings(data) {
    const map = Object.fromEntries(data.map(s => [s.key, s]));
    const lang = getLang();

    /* Ticker */
    if (map.ticker) {
      const tickerEl = document.querySelector('[data-i18n="ticker1"]');
      if (tickerEl) tickerEl.innerHTML = lang === 'tc' ? map.ticker.value_tc : map.ticker.value_en;
    }

    /* Hero */
    _sbHero = {
      hero_img:       map.hero_img?.value_tc    || '',
      hero_kicker_tc: map.hero_kicker?.value_tc || '',
      hero_kicker_en: map.hero_kicker?.value_en || '',
      hero_title_tc:  map.hero_title?.value_tc  || '',
      hero_title_en:  map.hero_title?.value_en  || '',
      hero_sub_tc:    map.hero_sub?.value_tc    || '',
      hero_sub_en:    map.hero_sub?.value_en    || '',
    };
    renderHero(_sbHero);
    document.body.classList.add('js-ready');

    /* Featured order */
    if (map.featured_order && map.featured_order.value_tc) {
      _sbFeaturedOrder = map.featured_order.value_tc.split(',').map(s => s.trim()).filter(Boolean);
    }

    /* Homepage Editor Picks */
    if (map.homepage_picks_slugs && map.homepage_picks_slugs.value_tc) {
      const slugs = map.homepage_picks_slugs.value_tc.split(',').map(s => s.trim()).filter(Boolean);
      if (slugs.length) { _sbPicksSlugs = slugs; renderEditor(); }
    } else {
      renderEditor();
    }

    /* Story articles */
    if (map.homepage_story_slugs && map.homepage_story_slugs.value_tc) {
      const storySlugs = map.homepage_story_slugs.value_tc.split(',').map(s => s.trim()).filter(Boolean).slice(0, 3);
      if (storySlugs.length) {
        window.IsshoAPI.fetchArticlesBySlug(storySlugs).then(({ data }) => {
          if (data && data.length) {
            const bySlug = Object.fromEntries(data.map(a => [a.slug, a]));
            _sbStoryArticles = storySlugs.map(slug => bySlug[slug]).filter(Boolean);
            renderStories();
          }
        });
      }
    }

    /* Hero article + side articles */
    const heroSlug = map.hero_article_slug && map.hero_article_slug.value_tc && map.hero_article_slug.value_tc.trim();
    const sideRaw  = map.homepage_side_slugs && map.homepage_side_slugs.value_tc;
    const sideSlugs = sideRaw ? sideRaw.split(',').map(s => s.trim()).filter(Boolean).slice(0, 3) : [];
    const allSlugs  = [...new Set([heroSlug, ...sideSlugs].filter(Boolean))];
    if (allSlugs.length) {
      window.IsshoAPI.fetchArticlesBySlug(allSlugs).then(({ data }) => {
        const bySlug = Object.fromEntries((data || []).map(a => [a.slug, a]));
        if (heroSlug && bySlug[heroSlug]) _sbHeroArticle  = bySlug[heroSlug];
        if (sideSlugs.length) _sbSideArticles = sideSlugs.map(s => bySlug[s]).filter(Boolean);
        renderHero(_sbHero);
      });
    }
  }

  /* Detect page reload (Cmd+R / F5) vs. first visit or link navigation */
  const _isReload = (function () {
    try {
      const nav = performance.getEntriesByType('navigation')[0];
      if (nav) return nav.type === 'reload';
    } catch (_) {}
    return !!(performance.navigation && performance.navigation.type === 1);
  })();

  /* Step 1: instant render from cache — skip on reload so stale data never flashes.
     On normal navigation (first visit / link click) cache gives instant hero. */
  if (!_isReload) {
    try {
      const cached = sessionStorage.getItem(_SC_KEY);
      if (cached) applySettings(JSON.parse(cached));
    } catch (_) {}
  }

  /* Step 2: always fetch fresh from Supabase, update cache, re-apply */
  window.IsshoAPI.fetchSiteSettings().then(({ data }) => {
    if (!data) return;
    try { sessionStorage.setItem(_SC_KEY, JSON.stringify(data)); } catch (_) {}
    applySettings(data);
  });

  /* ── Live exchange rates + FX calculator ── */
  (function initFX() {
    const CURRENCIES = ['HKD','TWD','USD','EUR','GBP','CAD','AUD','SGD'];
    const tickerEl  = document.getElementById('tickerRate');
    const fxInput   = document.getElementById('fxInput');
    const fxOutput  = document.getElementById('fxOutput');
    const fxFrom    = document.getElementById('fxFrom');
    const fxRates   = document.getElementById('fxRates');
    const fxTrigger = document.getElementById('fxTrigger');
    const fxClose   = document.getElementById('fxClose');
    let rates = {};
    let lastEdited = 'input';

    const fxRoot = document.getElementById('fx');
    if (fxTrigger) fxTrigger.addEventListener('click', () => fxRoot.classList.toggle('open'));
    if (fxClose)   fxClose.addEventListener('click',   () => fxRoot.classList.remove('open'));
    document.addEventListener('click', e => { if (fxRoot && !fxRoot.contains(e.target)) fxRoot.classList.remove('open'); });

    const fmt = v => v >= 10 ? v.toFixed(2) : v.toFixed(3);
    const fmtJPY = v => String(Math.round(v));

    function calcFromForeign() {
      const amt = parseFloat(fxInput.value);
      const cur = fxFrom.value;
      if (!isNaN(amt) && rates[cur]) fxOutput.value = fmtJPY(amt * rates[cur]);
    }
    function calcFromJPY() {
      const jpy = parseFloat(fxOutput.value.replace(/,/g,''));
      const cur = fxFrom.value;
      if (!isNaN(jpy) && rates[cur]) fxInput.value = fmt(jpy / rates[cur]);
    }

    if (fxInput)  fxInput.addEventListener('input',  () => { lastEdited = 'input';  calcFromForeign(); });
    if (fxOutput) fxOutput.addEventListener('input', () => { lastEdited = 'output'; calcFromJPY(); });
    if (fxFrom)   fxFrom.addEventListener('change',  () => {
      document.getElementById('fxFromLabel').textContent = fxFrom.value;
      lastEdited === 'output' ? calcFromJPY() : calcFromForeign();
    });

    fetch('https://open.er-api.com/v6/latest/JPY')
      .then(r => r.json())
      .then(json => {
        if (json.result !== 'success' || !json.rates) return;
        CURRENCIES.filter(c => json.rates[c]).forEach(c => { rates[c] = 1 / json.rates[c]; });

        if (tickerEl) {
          const parts = CURRENCIES.filter(c => rates[c]).map(c => `${c} <b>¥${fmt(rates[c])}</b>`);
          let idx = 0;
          const show = () => { tickerEl.innerHTML = parts.slice(idx, idx+2).join('&nbsp;&nbsp;'); idx = (idx+2) % parts.length; };
          show(); setInterval(show, 3000);
        }

        if (fxRates) {
          fxRates.innerHTML = CURRENCIES.filter(c => rates[c]).map(c =>
            `<div class="fx-rate-item"><div class="k">${c}/JPY</div><div class="v">${fmt(rates[c])}</div></div>`
          ).join('');
        }

        if (fxInput && fxInput.value) calcFromForeign();
      })
      .catch(() => {});
  })();

  function renderAll() {
    renderHero(_sbHero);
    renderHot();
    renderCats();
    renderEditor();
    renderNews();
    renderLatest();
    renderStories();
    renderCatSections();
  }

  /* boot */
  C.init(null);
  C.onLangChange(renderAll);
  renderAll();
  if (window.IsshoEditor) window.IsshoEditor.init();
  if (window.IsshoMembers)   window.IsshoMembers.init();
  if (window.IsshoHotSearch) window.IsshoHotSearch.init();
  if (window.IsshoSettings) window.IsshoSettings.init();
  if (window.IsshoSearch) window.IsshoSearch.init();
  /* js-ready is added inside applySettings() after hero renders with real data.
     - Refresh: sessionStorage cache → applySettings() fires synchronously → instant reveal
     - First visit: Supabase fetch → applySettings() → reveal (1500ms safety net in core.js backstops slow fetches) */
})();
</script>
<script src="/assets/js/preview-guard.js"></script>
</body>
