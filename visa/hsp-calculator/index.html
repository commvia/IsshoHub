    const L = lang === 'tc';

      breadHome:    L ? '首頁'           : 'Home',
      breadVisa:    L ? '簽證・在留資格' : 'Visa & Residency',

    Object.keys(els).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = els[id];
    });
  }
  setLang();
  C.onLangChange(setLang);
})();
</script>
