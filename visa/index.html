<script>
(function () {
  const D = window.ISSHO_DATA;
  const C = window.IsshoCore;

  /* Sub-categories for visa — extract key from URL fragment (#policy → 'policy') */
  const SUBS = D.nav.find(n => n.key === 'visa').sub.map(s => ({
    ...s,
    key: (s.url || '').split('#')[1] || ''
  }));
  let activeSub = 'all';
  let _articles = null;

  function getLang() { return C.getLang(); }

  /* ── Supabase article → card HTML ── */
  function sbCardHTML(a, opts) {
    opts = opts || {};
    const lang = getLang();
    const hasTC = !!(a.title_tc);
    const title = lang === 'tc' ? (a.title_tc || a.title_en) : (a.title_en || a.title_tc);
    const excerpt = lang === 'tc' ? (a.excerpt_tc || a.excerpt_en || '') : (a.excerpt_en || a.excerpt_tc || '');
    const langBadge = (lang === 'tc' && !hasTC) ? '<span style="display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 6px;border-radius:4px;background:#e8f0fb;color:#1a56a8;margin-bottom:6px;">EN ONLY</span><br>' : '';
    const img = a.cover_image_url || 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&w=800&q=80';
    const cat = a.category_key || '';
    const author = a.author || '';
    const date = a.published_at ? new Date(a.published_at).toLocaleDateString(lang === 'tc' ? 'zh-Hant' : 'en', { year:'numeric', month:'short', day:'numeric' }) : '';
    const articleUrl = `/article/?slug=${a.slug}`;
    return `
      <article class="card ${opts.featured ? 'featured' : ''}${opts.overlay ? ' overlay' : ''}" onclick="if(!event.target.closest('a'))window.location.href='${articleUrl}'" style="cursor:pointer">
        <a class="card-media" href="${articleUrl}" style="background-image: url('${img}')">
        </a>
        <a class="card-edit-chip" href="/article/?slug=${a.slug}&edit=1" title="編輯文章">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </a>
        <div class="card-body">
          ${langBadge}<h3 class="card-title">${title}</h3>
          <p class="card-excerpt">${excerpt}</p>
          <div class="card-meta">
            <span class="author">${author}</span>
            <span class="dot"></span>
            <span>${date}</span>
          </div>
        </div>
      </article>`;
  }

  async function loadArticles() {
    if (_articles) return _articles;
    const { data } = await window.IsshoAPI.fetchArticles({ category: 'visa', limit: 20 });
    _articles = data || [];
    return _articles;
  }

  function renderCatHero() {
    const lang = getLang();
    const title = lang === 'tc' ? '簽證・在留資格' : 'Visa & Residency';
    const enSub = lang === 'tc' ? 'Visa & Residency' : '簽證・在留資格';
    const desc = lang === 'tc'
      ? '從經營管理簽證到永住權、J-Find 到數位遊牧，覆蓋所有在日本的在留資格類型。雙語深度指南，讓每個步驟都清晰明確。'
      : 'From Business Manager Visa to Permanent Residency, J-Find to Digital Nomad — every status type covered. Bilingual, in-depth, step-by-step.';
    const breadcrumb = lang === 'tc' ? '簽證・在留資格' : 'Visa & Residency';
    const statLabel = lang === 'tc' ? '篇文章' : 'articles';
    const statSubs = lang === 'tc' ? '個子分類' : 'sub-categories';

    document.getElementById('catHeroTitle').textContent = title;
    document.getElementById('catHeroEn').textContent = enSub;
    document.getElementById('catHeroDesc').textContent = desc;
    document.getElementById('heroBreadcrumbCurrent').textContent = breadcrumb;
    document.getElementById('catStatLabel').textContent = statLabel;
    document.getElementById('catStatSubs').textContent = statSubs;
    document.getElementById('catHeroWatermark').textContent = lang === 'tc' ? '簽証' : 'VISA';

    const eyebrow = document.getElementById('catHeroEyebrow');
    if (eyebrow) eyebrow.textContent = lang === 'tc' ? '02 · 簽證・在留資格' : '02 · Visa & Residency';

    const fhEl = document.getElementById('featuredHeadline');
    const fsEl = document.getElementById('featuredSub');
    if (fhEl) fhEl.textContent = lang === 'tc' ? '本期精選' : 'Featured';
    if (fsEl) fsEl.textContent = lang === 'tc' ? '編輯部本月深度推薦。' : 'Editor\'s pick this month.';
  }

  /* ── Backward-compatible sub-category helper ── */
  function articleHasSub(a, subKey) {
    if (a.sub_category_keys && a.sub_category_keys.length) {
      return a.sub_category_keys.includes(subKey);
    }
    return a.sub_category_key === subKey;
  }

  /* ── Build sub-category nav with real article counts ── */
  function renderSubcatNav(articles) {
    const lang = getLang();
    const total = articles ? articles.length : 0;
    const tabs = [{ key: 'all', tc: '全部', en: 'All', count: total }];
    SUBS.forEach(s => {
      const count = articles ? articles.filter(a => articleHasSub(a, s.key)).length : 0;
      tabs.push({ key: s.key, tc: s.tc, en: s.en, count });
    });

    const scrollEl = document.getElementById('subcatScroll');
    scrollEl.innerHTML = tabs.map(tab => {
      const label = lang === 'tc' ? tab.tc : tab.en;
      return `<a href="javascript:void(0)" class="subcat-tab${tab.key === activeSub ? ' active' : ''}" data-sub="${tab.key}">
        ${label}<span class="count">${tab.count}</span>
      </a>`;
    }).join('');

    /* Replace node to avoid duplicate listeners */
    const newScroll = scrollEl.cloneNode(true);
    scrollEl.parentNode.replaceChild(newScroll, scrollEl);
    newScroll.addEventListener('click', e => {
      const tab = e.target.closest('.subcat-tab');
      if (!tab) return;
      activeSub = tab.getAttribute('data-sub');
      newScroll.querySelectorAll('.subcat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      filterAndRender();
    });
  }

  /* ── Filter articles by active sub-category ── */
  function filterArticles(articles) {
    if (activeSub === 'all') return articles;
    return articles.filter(a => articleHasSub(a, activeSub));
  }

  /* ── HSP 工具卡 ── */
  function buildHspToolCard(lang) {
    const L = lang === 'tc';
    return `<div class="hsp-tool-card">
      <div class="hsp-tool-card-eyebrow">— TOOL · ${L ? '實用工具' : 'Tool'}</div>
      <div class="hsp-tool-card-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="2" width="16" height="20" rx="2"/>
          <rect x="7" y="5" width="10" height="3.5" rx="0.5"/>
          <circle cx="8.5" cy="13" r="0.9" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="13" r="0.9" fill="currentColor" stroke="none"/>
          <circle cx="15.5" cy="13" r="0.9" fill="currentColor" stroke="none"/>
          <circle cx="8.5" cy="17" r="0.9" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="17" r="0.9" fill="currentColor" stroke="none"/>
          <circle cx="15.5" cy="17" r="0.9" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <div class="hsp-tool-card-title">${L ? '高度專門職積分計算' : 'HSP Points Calculator'}</div>
      <div class="hsp-tool-card-desc">${L
        ? '3 分鐘快速評估，看看是否符合 70 / 80 分申請門檻。<br><br>・高度専門職 1 號 (イ)：高度學術研究活動<br>・高度専門職 1 號 (ロ)：高度專門・技術活動<br>・高度専門職 1 號 (ハ)：高度經營・管理活動'
        : 'A quick 3-minute estimate to see if you reach the 70 or 80 point threshold.<br><br>・Type (イ): Academic / Research<br>・Type (ロ): Technical / Engineering<br>・Type (ハ): Business Management'
      }</div>
      <a href="/visa/hsp-calculator/" class="hsp-tool-card-btn">${L ? '開始計算 →' : 'Calculate →'}</a>
    </div>`;
  }

  /* ── Core render: featured + articles grid ── */
  function filterAndRender() {
    loadArticles().then(articles => {
      const lang = getLang();
      const filtered = filterArticles(articles);
      const featuredSection = document.querySelector('.cat-featured-section');

      /* Featured: only show if an article is explicitly marked featured */
      const featured = articles.find(a => a.featured) || null;
      if (activeSub === 'all' && featured) {
        if (featuredSection) featuredSection.style.display = '';
        document.getElementById('visaFeaturedGrid').innerHTML = sbCardHTML(featured, { featured: true, overlay: true });
      } else {
        if (featuredSection) featuredSection.style.display = 'none';
      }

      /* Articles title */
      const subTitle = activeSub === 'all'
        ? (lang === 'tc' ? '全部文章' : 'All articles')
        : (() => { const s = SUBS.find(x => x.key === activeSub); return s ? (lang === 'tc' ? s.tc : s.en) : ''; })();
      document.getElementById('articlesTitle').textContent = subTitle;

      /* Articles grid: exclude the featured article shown in hero spot */
      const gridArticles = activeSub === 'all' ? articles.filter(a => a.id !== (featured && featured.id)) : filtered;
      const TOOL_CARD_SUBS = ['all', 'hsp', 'business-manager', 'engineer', 'jfind'];
      const showToolCard = TOOL_CARD_SUBS.includes(activeSub);
      const toolCard = showToolCard ? buildHspToolCard(lang) : '';
      function injectToolCard(htmlArr) {
        if (!showToolCard) return htmlArr.join('');
        const before = htmlArr.slice(0, 2).join('');
        const after = htmlArr.slice(2).join('');
        return before + toolCard + after;
      }
      if (gridArticles.length) {
        document.getElementById('visaArticlesGrid').innerHTML = injectToolCard(gridArticles.map(a => sbCardHTML(a)));
      } else if (articles.length) {
        /* Sub-cat exists but no articles yet */
        document.getElementById('visaArticlesGrid').innerHTML = toolCard + `
          <div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--ink-3);">
            <div style="font-size:36px;margin-bottom:12px;">📭</div>
            <div style="font-size:15px;font-weight:500;">${lang === 'tc' ? '這個分類暫時沒有文章' : 'No articles in this sub-category yet'}</div>
          </div>`;
      } else {
        /* No Supabase articles at all — fallback to static data */
        document.getElementById('visaArticlesGrid').innerHTML = injectToolCard(D.visa_articles.map(a => C.cardHTML(a)));
      }

      /* Update hero article count */
      const numEl = document.getElementById('catStatNum');
      if (numEl && articles.length) numEl.textContent = articles.length;
    });
  }

  function renderAll() {
    renderCatHero();
    /* Load articles first, then build nav with real counts + render grid */
    loadArticles().then(articles => {
      renderSubcatNav(articles);
      filterAndRender();
    });
  }

  C.init('visa');
  C.onLangChange(function () { activeSub = 'all'; renderAll(); });
  renderAll();
  if (window.IsshoEditor) window.IsshoEditor.init();
  if (window.IsshoMembers)   window.IsshoMembers.init();
  if (window.IsshoHotSearch) window.IsshoHotSearch.init();
  if (window.IsshoSettings) window.IsshoSettings.init();
  if (window.IsshoSearch) window.IsshoSearch.init();
  document.body.classList.add('js-ready');

  /* ── Sync ticker1 from Supabase site_settings ── */
  if (window.IsshoAPI && window.IsshoAPI.fetchSiteSettings) {
    window.IsshoAPI.fetchSiteSettings().then(function (res) {
      if (!res.data) return;
      var map = {};
      res.data.forEach(function (s) { map[s.key] = s; });
      if (map.ticker) {
        var lang = C.getLang();
        var tickerEl = document.querySelector('[data-i18n="ticker1"]');
        if (tickerEl) tickerEl.innerHTML = lang === 'tc' ? map.ticker.value_tc : map.ticker.value_en;
      }
    });
  }

  /* ── Live FX calculator ── */
  (function initFX() {
    const CURRENCIES = ['HKD','TWD','USD','EUR','GBP','CAD','AUD','SGD'];
    const tickerEl  = document.getElementById('tickerRate');
    const fxInput   = document.getElementById('fxInput');
    const fxOutput  = document.getElementById('fxOutput');
    const fxFrom    = document.getElementById('fxFrom');
    const fxRates   = document.getElementById('fxRates');
    const fxTrigger = document.getElementById('fxTrigger');
    const fxClose   = document.getElementById('fxClose');
    let rates = {};
    let lastEdited = 'input';
    const fxRoot = document.getElementById('fx');
    if (fxTrigger) fxTrigger.addEventListener('click', () => fxRoot.classList.toggle('open'));
    if (fxClose)   fxClose.addEventListener('click',   () => fxRoot.classList.remove('open'));
    document.addEventListener('click', e => { if (fxRoot && !fxRoot.contains(e.target)) fxRoot.classList.remove('open'); });
    const fmt = v => v >= 10 ? v.toFixed(2) : v.toFixed(3);
    const fmtJPY = v => String(Math.round(v));
    function calcFromForeign() {
      const amt = parseFloat(fxInput.value);
      const cur = fxFrom.value;
      if (!isNaN(amt) && rates[cur]) fxOutput.value = fmtJPY(amt * rates[cur]);
    }
    function calcFromJPY() {
      const jpy = parseFloat(fxOutput.value);
      const cur = fxFrom.value;
      if (!isNaN(jpy) && rates[cur]) fxInput.value = fmt(jpy / rates[cur]);
    }
    if (fxInput)  fxInput.addEventListener('input',  () => { lastEdited = 'input';  calcFromForeign(); });
    if (fxOutput) fxOutput.addEventListener('input', () => { lastEdited = 'output'; calcFromJPY(); });
    if (fxFrom)   fxFrom.addEventListener('change',  () => {
      document.getElementById('fxFromLabel').textContent = fxFrom.value;
      lastEdited === 'output' ? calcFromJPY() : calcFromForeign();
    });
    fetch('https://open.er-api.com/v6/latest/JPY')
      .then(r => r.json())
      .then(json => {
        if (json.result !== 'success' || !json.rates) return;
        CURRENCIES.filter(c => json.rates[c]).forEach(c => { rates[c] = 1 / json.rates[c]; });
        if (tickerEl) {
          const parts = CURRENCIES.filter(c => rates[c]).map(c => `${c} <b>¥${fmt(rates[c])}</b>`);
          let idx = 0;
          const show = () => { tickerEl.innerHTML = parts.slice(idx, idx+2).join('&nbsp;&nbsp;'); idx = (idx+2) % parts.length; };
          show(); setInterval(show, 3000);
        }
        if (fxRates) {
          fxRates.innerHTML = CURRENCIES.filter(c => rates[c]).map(c =>
            `<div class="fx-rate-item"><div class="k">${c}/JPY</div><div class="v">${fmt(rates[c])}</div></div>`
          ).join('');
        }
        if (fxInput && fxInput.value) calcFromForeign();
      })
      .catch(() => {});
  })();

})();

</script>
